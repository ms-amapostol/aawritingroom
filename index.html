  body{font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Fraunces',Georgia,serif;font-weight:500;letter-spacing:-.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.02em;text-transform:uppercase;color:var(--muted);}
  .reading{font-family:'Newsreader',Georgia,serif;}
  button{font-family:inherit;cursor:pointer;}
  textarea,input,select{font-family:inherit;color:var(--ink);}
  .app{max-width:1180px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  /* font modes (serif is the default literary mix; these override globally when chosen) */
  .app.font-sans, .app.font-sans *{font-family:'Inter',system-ui,-apple-system,sans-serif !important;}
  .app.font-type, .app.font-type *{font-family:'IBM Plex Mono','Courier New',monospace !important;letter-spacing:-.045em;}
  .app.font-type .write-area{letter-spacing:-.055em;font-size:14px;}

  /* top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(243,239,231,.82);backdrop-filter:blur(8px);z-index:20;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand-mark{flex-shrink:0;display:block;box-shadow:0 1px 5px rgba(30,22,10,.20);border-radius:9px;}
  .brand-text{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .brand .logo{font-family:'Fraunces';font-size:19px;font-weight:600;}
  .brand .sub{font-size:12px;color:var(--muted);}
  @media(max-width:640px){ .brand-text .sub{display:none;} }
  .proj-chip{font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:4px 12px;background:var(--panel);}
  .topbar-actions{display:flex;gap:8px;align-items:center;}

  .tabs{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--line);background:rgba(243,239,231,.82);backdrop-filter:blur(8px);position:sticky;top:65px;z-index:19;}
  .tab{border:none;background:none;padding:14px 4px;margin-right:26px;font-size:14px;color:var(--muted);border-bottom:2px solid transparent;font-weight:500;}
  .tab.active{color:var(--ink);border-bottom-color:var(--indigo);}
  .tab .badge{display:inline-block;margin-left:6px;font-size:11px;background:var(--indigo-soft);color:var(--indigo);border-radius:999px;padding:1px 7px;font-family:'IBM Plex Mono';}

  .content{padding:28px 24px 80px;flex:1;}

  /* buttons */
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;padding:9px 15px;font-size:13px;font-weight:500;transition:.12s;display:inline-flex;align-items:center;gap:7px;}
  .btn:hover{border-color:#C4CDD2;}
  .btn-primary{background:var(--indigo);border-color:var(--indigo);color:#fff;}
  .btn-primary:hover{background:#0C5F58;}
  .btn-red{background:var(--red);border-color:var(--red);color:#fff;}
  .btn-red:hover{background:#0E2E44;}
  .btn-ghost{background:none;border-color:transparent;color:var(--muted);}
  .btn-ghost:hover{color:var(--ink);background:#E9EDEF;}
  .btn-sm{padding:6px 11px;font-size:12px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  /* setup */
  .setup{max-width:720px;margin:40px auto;}
  .setup .eyebrow{color:var(--indigo);font-weight:600;}
  .setup h2{font-size:30px;margin:6px 0 4px;}
  .setup p.lede{color:var(--muted);margin:0 0 28px;font-size:15px;}
  .choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .choice-grid.three{grid-template-columns:repeat(3,1fr);}
  .choice-card{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:18px;text-align:left;transition:.12s;}
  .choice-card:hover{border-color:var(--indigo);transform:translateY(-1px);box-shadow:var(--shadow);}
  .choice-card.selected{border-color:var(--indigo);background:var(--indigo-soft);}
  .choice-card .t{font-family:'Fraunces';font-size:18px;font-weight:500;}
  .choice-card .d{font-size:12.5px;color:var(--muted);margin-top:4px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;}
  .field input, .field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:15px;background:var(--panel);}
  .field input:focus,.field textarea:focus{outline:2px solid var(--indigo-soft);border-color:var(--indigo);}
  .setup-nav{display:flex;justify-content:space-between;margin-top:26px;align-items:center;}
  .steps-dots{display:flex;gap:6px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line);}
  .dot.on{background:var(--indigo);}
  .note{background:var(--sage-soft);border:1px solid #D7E0E4;border-radius:10px;padding:12px 14px;font-size:13px;color:#2C4A5A;margin-top:18px;display:flex;gap:10px;}

  /* dashboard */
  .dash-head{display:flex;justify-content:space-between;align-items:flex-end;margin:6px 0 20px;gap:16px;flex-wrap:wrap;}
  .dash-head h2{font-size:28px;margin:0;}
  .dash-head .sub{color:var(--muted);font-size:14px;margin-top:2px;}
  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
  .filter-bar select{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;background:var(--panel);}
  .proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
  .proj-card{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:.12s;display:flex;flex-direction:column;gap:12px;}
  .proj-card:hover{border-color:var(--indigo);transform:translateY(-2px);}
  .pc-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
  .pc-title{font-family:'Fraunces';font-size:19px;font-weight:500;line-height:1.2;}
  .pc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
  .pc-tag{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);background:var(--sage-soft);border-radius:4px;padding:2px 7px;}
  .pc-sum{font-family:'Newsreader';font-size:14px;color:#2B3A42;line-height:1.5;min-height:42px;}
  .pc-metrics{display:flex;gap:16px;border-top:1px solid var(--line);padding-top:12px;}
  .prog{height:7px;background:var(--line);border-radius:4px;overflow:hidden;}
  .prog i{display:block;height:100%;background:var(--indigo);border-radius:4px;transition:width .3s;}
  .prog-lbl{font-family:'IBM Plex Mono';font-size:10.5px;color:var(--muted);margin-top:5px;}
  .next-step{background:var(--sage-soft);border-radius:8px;padding:8px 11px;display:flex;flex-direction:column;gap:1px;}
  .next-step .ns-do{font-size:12.5px;font-weight:600;color:var(--indigo);}
  .next-step .ns-hint{font-family:'Newsreader';font-size:12.5px;color:#2C4A5A;}
  .pc-metric .n{font-family:'Fraunces';font-size:20px;font-weight:600;line-height:1;}
  .pc-metric .l{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;color:var(--muted);margin-top:3px;}
  .ring{--p:0;width:52px;height:52px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;background:conic-gradient(var(--indigo) calc(var(--p)*1%), var(--line) 0);}
  .ring .inner{width:40px;height:40px;border-radius:50%;background:var(--panel);display:grid;place-items:center;font-family:'IBM Plex Mono';font-size:13px;font-weight:500;color:var(--ink);}
  .pc-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:6px;}
  .pc-del:hover{background:var(--red-soft);color:var(--red);}
  .newcard{border:1px dashed var(--indigo);background:var(--indigo-soft);color:var(--indigo);display:grid;place-items:center;min-height:180px;font-family:'Fraunces';font-size:18px;cursor:pointer;border-radius:14px;transition:.12s;}
  .newcard:hover{background:#d3ece9;}
  .factor-row{display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:12.5px;margin-bottom:6px;}
  .factor-bar{flex:1;height:6px;background:var(--line);border-radius:3px;overflow:hidden;}
  .factor-bar i{display:block;height:100%;background:var(--indigo);border-radius:3px;}
  .manifesto{font-family:'Newsreader';font-style:italic;color:var(--muted);font-size:13px;border-left:2px solid var(--indigo-soft);padding:4px 0 4px 12px;margin:10px 0;}

  /* story spine roadmap */
  .howbox{border:1px solid var(--line);border-radius:12px;background:var(--panel);margin-bottom:16px;overflow:hidden;}
  .how-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;gap:10px;background:none;border:none;padding:13px 16px;cursor:pointer;font-family:'Fraunces';font-size:15px;color:var(--ink);}
  .how-toggle:hover{background:var(--indigo-soft);}
  .how-body{padding:0 16px 16px;}
  .how-steps{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;margin:12px 0;}
  @media(max-width:640px){.how-steps{grid-template-columns:1fr;}}
  .how-step{display:flex;gap:9px;align-items:flex-start;font-size:13px;}
  .how-step .hs-n{background:var(--indigo);color:#fff;width:20px;height:20px;border-radius:50%;display:grid;place-items:center;font-family:'IBM Plex Mono';font-size:11px;flex-shrink:0;margin-top:1px;}
  .how-step .hs-act{font-family:'IBM Plex Mono';font-size:9px;text-transform:uppercase;color:var(--muted);margin-left:4px;}
  .how-step .hs-p{color:var(--muted);font-family:'Newsreader';font-size:12.5px;}
  .exemplar{background:var(--sage-soft);border-radius:10px;padding:12px 14px;margin-top:6px;}
  .ex-row{display:flex;gap:10px;padding:3px 0;font-size:13px;align-items:baseline;}
  .ex-row .ex-step{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;color:var(--sage);min-width:130px;flex-shrink:0;}
  .ex-row .ex-text{font-family:'Newsreader';color:#2B3A42;}
  @media(max-width:640px){.ex-row{flex-direction:column;gap:1px;} .ex-row .ex-step{min-width:0;}}

  .armature-bar{background:var(--indigo-soft);border:1px solid #c9e3e0;border-radius:12px;padding:14px 16px;margin-bottom:20px;}
  .armature-bar .lbl{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--indigo);margin-bottom:6px;}
  .armature-bar textarea{width:100%;border:none;background:none;resize:vertical;font-family:'Newsreader';font-size:16px;line-height:1.4;color:#173a37;min-height:30px;}
  .armature-bar textarea:focus{outline:none;}
  .spine{position:relative;padding-left:8px;}
  .beat{position:relative;padding:0 0 8px 42px;margin-bottom:16px;}
  .beat:before{content:"";position:absolute;left:14px;top:30px;bottom:-16px;width:2px;background:var(--line);}
  .beat:last-child:before{display:none;}
  .beat .node{position:absolute;left:0;top:2px;width:30px;height:30px;border-radius:50%;background:var(--indigo);color:#fff;display:grid;place-items:center;font-family:'IBM Plex Mono';font-size:13px;font-weight:500;z-index:1;}
  .beat .act{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
  .beat .step{font-family:'Fraunces';font-size:18px;font-weight:500;margin:1px 0 2px;}
  .beat .purpose{font-family:'Newsreader';font-size:13.5px;color:var(--muted);font-style:italic;margin-bottom:8px;}
  .beat textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:'Newsreader';font-size:15px;line-height:1.55;background:var(--panel);resize:vertical;min-height:56px;}
  .beat textarea:focus{outline:none;border-color:var(--indigo);}
  .beat-chaps{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .beat-chap{font-size:12px;background:var(--sage-soft);border:1px solid var(--line);border-radius:6px;padding:3px 9px;color:#2C4A5A;}
  .flag{border:1px solid var(--line);border-left:3px solid var(--muted);background:var(--panel);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
  .flag.high{border-left-color:var(--red);} .flag.medium{border-left-color:#C98A2B;} .flag.low{border-left-color:var(--sage);}
  .flag .ft{font-weight:600;font-size:13px;display:flex;justify-content:space-between;gap:8px;}
  .flag .fsev{font-family:'IBM Plex Mono';font-size:9px;text-transform:uppercase;color:var(--muted);}
  .flag .fd{font-family:'Newsreader';font-size:14px;color:#2B3A42;margin-top:3px;line-height:1.5;}
  .credit{font-size:12px;color:var(--muted);text-align:center;padding:24px 0 8px;line-height:1.6;}
  .credit a{color:var(--indigo);text-decoration:none;border-bottom:1px solid var(--indigo-soft);}

  .pitch-strip{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 10px;margin-bottom:8px;}
  .pitch-chip{flex:0 0 auto;width:180px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 10px;}
  .pitch-chip .pcs{font-family:'IBM Plex Mono';font-size:9px;text-transform:uppercase;color:var(--indigo);margin-bottom:2px;}
  .pitch-chip .pct2{font-family:'Newsreader';font-size:12px;color:#2B3A42;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .pitch-para{background:var(--sage-soft);border-radius:10px;padding:10px 14px;font-family:'Newsreader';font-size:14.5px;color:#2C4A5A;margin-bottom:12px;line-height:1.55;}
  .slot{margin-top:8px;border-top:1px dashed var(--line);padding-top:6px;}
  .slot-lbl{font-family:'IBM Plex Mono';font-size:9.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:block;margin-bottom:2px;}
  .slot-item{display:flex;align-items:center;gap:6px;padding:2px 0;font-size:13px;}
  .slot-item input.si-t{flex:1;border:none;background:none;font-size:13px;padding:2px 0;border-bottom:1px dashed transparent;min-width:60px;}
  .slot-item input.si-t:focus{outline:none;border-bottom-color:var(--indigo);}
  .slot-item select{font-size:11px;border:1px solid var(--line);border-radius:6px;padding:2px 4px;background:#fff;max-width:120px;color:var(--muted);}
  .slot-mini{border:none;background:none;color:var(--muted);cursor:pointer;padding:0 3px;font-size:12px;line-height:1;}
  .slot-mini:hover{color:var(--indigo);}
  .slot-add{font-size:11.5px;color:var(--indigo);background:none;border:none;cursor:pointer;padding:3px 0 0;}
  .slot-add:hover{text-decoration:underline;}
  .beatedit{display:grid;grid-template-columns:80px 1fr 1.4fr auto;gap:6px;align-items:center;margin-bottom:6px;}
  @media(max-width:640px){.beatedit{grid-template-columns:1fr;}}
  .beatedit input{border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:12.5px;}
  .score-panel{background:var(--sage-soft);border-radius:10px;padding:12px 14px;}
  .score-note{font-family:'Newsreader';font-size:12.5px;color:#2C4A5A;margin-top:8px;line-height:1.5;}
  .slot-head{display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;padding:4px 0;width:100%;text-align:left;}
  .slot-head:hover .slot-lbl{color:var(--indigo);}
  .slot-head .caret{color:var(--muted);font-size:10px;}
  .doc-picker{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;}
  .doc-picker input{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;flex:1;min-width:140px;}
  .doc-picker select{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;max-width:280px;background:var(--panel);}

  /* characters v2 */
  .char-layout{display:grid;grid-template-columns:190px 1fr;gap:20px;align-items:start;}
  @media(max-width:760px){.char-layout{grid-template-columns:1fr;}}
  .tier-nav{position:sticky;top:130px;display:flex;flex-direction:column;gap:5px;}
  @media(max-width:760px){.tier-nav{position:static;flex-direction:row;flex-wrap:wrap;}}
  .tier-btn{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid transparent;background:none;border-radius:9px;padding:8px 11px;font-size:13.5px;color:var(--muted);cursor:pointer;text-align:left;}
  .tier-btn:hover{background:var(--sage-soft);}
  .tier-btn.on{background:var(--indigo-soft);color:var(--indigo);border-color:#c9e3e0;font-weight:600;}
  .tier-btn .cnt{font-family:'IBM Plex Mono';font-size:11px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:0 7px;}
  .tier-legend{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 10px;margin:6px 0 2px;display:flex;flex-direction:column;gap:7px;}
  .tl-row{display:flex;flex-direction:column;gap:3px;}
  .tl-row span:last-child{font-family:'Newsreader';font-size:11.5px;color:var(--muted);line-height:1.4;}
  .crow{border:1px solid var(--line);border-radius:12px;background:var(--panel);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);}
  .crow-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;width:100%;background:none;border:none;text-align:left;}
  .crow-head:hover{background:#f6f8f9;}
  .crow-name{font-family:'Fraunces';font-size:16px;font-weight:500;white-space:nowrap;}
  .crow-thumb{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--line);}
  .cid-row{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;}
  .portrait{width:130px;flex-shrink:0;position:relative;}
  .portrait img{width:130px;height:160px;object-fit:cover;border-radius:10px;border:1px solid var(--line);display:block;}
  .portrait-empty{width:130px;height:160px;border:1px dashed var(--line);border-radius:10px;display:grid;place-items:center;color:var(--muted);font-size:11px;font-family:'IBM Plex Mono';background:#f6f8f9;}
  .portrait-x{position:absolute;top:4px;right:4px;background:rgba(20,41,61,.75);color:#fff;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:11px;line-height:1;}
  .portrait-actions{display:flex;gap:6px;margin-top:6px;}
  .portrait-actions .btn{flex:1;justify-content:center;padding:6px 4px;font-size:11.5px;}
  .portrait.wide{width:170px;}
  .portrait.wide img{width:170px;height:110px;}
  .portrait.wide .portrait-empty{width:170px;height:110px;}
  .appears{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:baseline;}
  .appears-link{background:var(--indigo-soft);color:var(--indigo);border:1px solid #c9e3e0;border-radius:6px;padding:2px 8px;font-size:12px;cursor:pointer;}
  .appears-link:hover{background:#d3ece9;}
  .prose-preview{border:1px solid var(--line);border-radius:12px;padding:22px 24px;background:var(--panel);font-family:'Newsreader',Georgia,serif;font-size:17px;line-height:1.7;white-space:pre-wrap;min-height:200px;}
  .prose-link{color:var(--indigo);border-bottom:1px solid var(--indigo-soft);cursor:pointer;font-weight:500;}
  .prose-link:hover{background:var(--indigo-soft);border-radius:3px;}
  .rolltip{display:flex;align-items:baseline;gap:9px;background:var(--indigo-soft);border:1px solid #c9e3e0;border-radius:10px;padding:9px 13px;margin-bottom:14px;font-family:'Newsreader';font-size:14.5px;color:#173a37;animation:tipfade .5s;}
  .rt-star{color:var(--indigo);flex-shrink:0;}
  @keyframes tipfade{from{opacity:0;transform:translateY(2px);}to{opacity:1;transform:none;}}
  .beat-suggest{background:var(--sage-soft);border:1px solid #D7E0E4;border-radius:10px;padding:11px 13px;margin-bottom:12px;}
  /* review tab */
  .rev-filters{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .rev-seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;}
  .seg-btn{border:none;background:none;border-radius:8px;padding:6px 12px;font-size:13px;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .seg-btn.on{background:var(--ink);color:#fff;}
  .seg-n{font-family:'IBM Plex Mono';font-size:10px;background:rgba(0,0,0,.12);border-radius:999px;padding:0 6px;}
  .seg-btn.on .seg-n{background:rgba(255,255,255,.25);}
  .rev-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);}
  .rev-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:7px;}
  .rev-kind{color:#fff;font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:.03em;border-radius:5px;padding:2px 8px;}
  .rev-where{font-size:12px;color:var(--muted);}
  .rev-status-tag{margin-left:auto;font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;color:var(--muted);}
  .fsev.sev-high{color:#B4472F;} .fsev.sev-medium{color:#B9762F;} .fsev.sev-low{color:var(--muted);}
  .fsev{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;}
  .rev-text{font-family:'Fraunces';font-size:16px;line-height:1.4;margin-bottom:4px;}
  .rev-detail{font-family:'Newsreader';font-size:14px;color:#3A4650;line-height:1.55;margin-bottom:10px;}
  .rev-actions{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
  /* warm accent on the rolling tip — lamplight, not clinic */
  .rolltip{background:linear-gradient(180deg,var(--amber-soft),#F7EEE0);border-color:#E9D4B4;color:#5A4426;}
  .rt-star{color:var(--amber);}
  /* welcome modal */
  .welcome-modal{background:var(--panel);border-radius:18px;max-width:480px;width:92vw;max-height:90vh;overflow:auto;box-shadow:0 24px 80px rgba(40,30,15,.35);}
  .welcome-hero{background:linear-gradient(160deg,var(--indigo) 0%, #0B5D57 100%);padding:28px 24px 22px;text-align:center;border-radius:18px 18px 0 0;}
  .welcome-avatar{width:112px;height:112px;border-radius:50%;object-fit:cover;border:4px solid rgba(255,255,255,.9);box-shadow:0 6px 18px rgba(0,0,0,.25);}
  .welcome-name{font-family:'Inter';font-size:23px;color:#fff;margin-top:12px;font-weight:600;letter-spacing:-.01em;}
  .welcome-role{font-size:13px;color:rgba(255,255,255,.85);margin-top:2px;font-family:'Inter';}
  .welcome-body{padding:22px 26px 24px;}
  .welcome-body p{font-family:'Inter';font-weight:400;font-size:15px;line-height:1.65;color:#33291B;margin:0 0 13px;}
  .welcome-body a{color:var(--indigo);font-weight:600;}
  .welcome-cta{width:100%;margin-top:16px;padding:12px;font-size:15px;}
  .welcome-fine{text-align:center;font-size:11.5px;color:var(--muted);margin-top:10px;}
  .welcome-legal{border-top:1px solid var(--line);margin-top:14px;padding-top:12px;font-size:11px;color:var(--muted);line-height:1.5;text-align:center;}
  /* footer */
  .room-footer{margin-top:auto;padding:26px 24px 30px;text-align:center;font-size:12px;color:var(--muted);line-height:1.7;}
  .room-footer a{color:var(--muted);text-decoration:underline;text-underline-offset:2px;}
  .room-footer a:hover{color:var(--indigo);}
  /* getting started strip */
  .getstarted{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:18px;box-shadow:var(--shadow);}
  .gs-head{display:flex;justify-content:space-between;align-items:center;gap:10px;font-family:'Fraunces';font-size:16px;margin-bottom:12px;}
  .gs-x{border:none;background:none;color:var(--muted);font-size:12px;cursor:pointer;}
  .gs-x:hover{color:var(--ink);}
  .gs-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px 18px;}
  @media(max-width:680px){.gs-grid{grid-template-columns:1fr;}}
  .gs-step{display:flex;gap:10px;align-items:flex-start;}
  .gs-n{background:var(--amber-soft);color:var(--amber);font-family:'IBM Plex Mono';font-size:12px;border-radius:50%;width:22px;height:22px;display:grid;place-items:center;flex-shrink:0;margin-top:1px;}
  .gs-p{font-size:13px;color:var(--muted);line-height:1.5;margin-top:2px;}
  /* habit loop */
  .today-bar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 14px;margin-bottom:14px;font-size:13px;}
  .tb-label{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;color:var(--muted);}
  .tb-track{flex:1;min-width:90px;height:8px;background:#ECE5D8;border-radius:99px;overflow:hidden;}
  .tb-track i{display:block;height:100%;background:var(--indigo);border-radius:99px;transition:width .4s;}
  .tb-count{color:var(--ink);}
  .tb-goal{border:none;background:none;color:var(--indigo);cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px;padding:0;font-size:inherit;}
  .tb-done{color:var(--sage);font-weight:600;margin-left:6px;}
  .tb-identity{font-family:'Newsreader';font-style:italic;font-size:12.5px;color:var(--amber);}
  .celebrate{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#F7F1E6;border-radius:14px;padding:14px 22px;font-family:'Newsreader';font-size:15.5px;box-shadow:0 12px 40px rgba(30,22,10,.35);z-index:60;max-width:min(560px,90vw);cursor:pointer;animation:celebup .5s ease;line-height:1.5;}
  .celeb-spark{color:#E9C46A;margin-right:6px;}
  @keyframes celebup{from{opacity:0;transform:translateX(-50%) translateY(14px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  /* welcome back */
  .welcome-back{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:linear-gradient(180deg,var(--amber-soft),#F6EDDD);border:1px solid #E9D4B4;border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:14px;line-height:1.55;}
  .welcome-back .btn{flex-shrink:0;margin-left:auto;}
  /* publish tab */
  .pub-step{display:flex;gap:12px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:8px;box-shadow:var(--shadow);}
  .pub-step.done{opacity:.72;}
  .pub-check{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);background:#fff;cursor:pointer;flex-shrink:0;font-size:14px;color:#fff;line-height:1;}
  .pub-check.on{background:var(--indigo);border-color:var(--indigo);}
  .pub-auto{min-width:44px;height:26px;border-radius:8px;background:var(--sage-soft);color:var(--sage);font-family:'IBM Plex Mono';font-size:11px;display:grid;place-items:center;flex-shrink:0;padding:0 6px;}
  .pub-auto.on{background:var(--indigo);color:#fff;}
  .pub-title{font-family:'Fraunces';font-size:15.5px;margin-bottom:2px;}
  .pub-step.done .pub-title{text-decoration:line-through;text-decoration-color:rgba(0,0,0,.25);}
  .pub-desc{font-size:13px;color:var(--muted);line-height:1.5;}
  /* scope master control */
  .scope-master{background:var(--indigo-soft);border:1px solid #c9e3e0;border-radius:10px;padding:10px 12px;margin:0 0 12px;}
  .scope-row{display:flex;align-items:center;gap:8px;}
  .scope-row .world-select{flex:1;min-width:0;max-width:100%;}
  .scope-note{font-size:11.5px;color:#175E57;margin-top:6px;line-height:1.45;}
  /* marketing plan */
  .mk-hook{font-family:'Fraunces';font-size:18px;line-height:1.45;margin-bottom:8px;}
  .mk-label{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:.03em;color:var(--indigo);margin:12px 0 5px;}
  .mk-task{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px dashed var(--line);}
  .mk-task:last-child{border-bottom:none;}
  .mk-task .pub-check{width:22px;height:22px;font-size:12px;}
  .mk-task.done .mk-t{text-decoration:line-through;text-decoration-color:rgba(0,0,0,.3);opacity:.7;}
  .mk-t{font-size:13.5px;font-weight:500;}
  .mk-why{font-size:12px;color:var(--muted);line-height:1.45;margin-top:1px;}
  .mk-chiprow{display:flex;flex-wrap:wrap;gap:6px;}
  .mk-chip{background:var(--sage-soft);border:1px solid #D7E0E4;border-radius:999px;padding:3px 11px;font-size:12.5px;}
  .crow-role{font-size:12.5px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tier-badge{font-family:'IBM Plex Mono';font-size:9px;text-transform:uppercase;letter-spacing:.03em;border-radius:4px;padding:2px 7px;flex-shrink:0;}
  .tier-badge.main{background:var(--indigo);color:#fff;}
  .tier-badge.supporting{background:var(--indigo-soft);color:var(--indigo);}
  .tier-badge.ancillary{background:var(--sage-soft);color:var(--muted);}
  .vchip{font-family:'IBM Plex Mono';font-size:10px;border-radius:999px;padding:2px 8px;background:var(--sage-soft);color:var(--sage);flex-shrink:0;}
  .crow-body{padding:2px 14px 14px;border-top:1px solid var(--line);}
  .cfields{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-top:12px;}
  @media(max-width:640px){.cfields{grid-template-columns:1fr;}}
  .cfield label{display:block;font-size:11px;font-weight:600;color:var(--indigo);text-transform:uppercase;letter-spacing:.03em;font-family:'IBM Plex Mono';margin-bottom:3px;}
  .cfield .sub2{font-size:11px;color:var(--muted);font-family:'Newsreader';font-style:italic;margin:-1px 0 4px;}
  .cfield textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:'Newsreader';font-size:14px;line-height:1.5;resize:vertical;min-height:48px;background:#fff;}
  .cfield textarea:focus{outline:none;border-color:var(--indigo);}
  .copybox{background:#f4f6f7;border:1px solid var(--line);border-radius:8px;padding:10px;margin-top:10px;}
  .copybox textarea{width:100%;border:none;background:none;font-family:'IBM Plex Mono';font-size:11.5px;line-height:1.5;resize:vertical;min-height:80px;}
  .copybox textarea:focus{outline:none;}

  /* layout cols */
  .split{display:grid;grid-template-columns:1fr 320px;gap:24px;align-items:start;}
  @media(max-width:860px){.split{grid-template-columns:1fr;} .choice-grid,.choice-grid.three{grid-template-columns:1fr;}}
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap;}
  .section-head h2{font-size:22px;margin:0;}
  .section-head .sub{color:var(--muted);font-size:13px;}

  /* mode picker */
  .mode-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
  .mode-btn{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:7px 14px;font-size:13px;color:var(--muted);}
  .mode-btn.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}

  .write-area{width:100%;min-height:280px;border:1px solid var(--line);border-radius:12px;padding:22px 24px;font-family:'Newsreader',Georgia,serif;font-size:17px;line-height:1.7;background:var(--panel);resize:vertical;}
  .write-area:focus{outline:none;border-color:var(--indigo);box-shadow:var(--shadow);}
  .write-area.small{min-height:120px;font-size:16px;}

  /* cards */
  .card{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
  .card .ct{font-family:'Fraunces';font-size:16px;font-weight:500;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card .cbody{font-family:'Newsreader';font-size:15px;color:#2B3A42;margin-top:6px;line-height:1.55;}
  .card input.ci{border:none;background:none;font-family:'Fraunces';font-size:16px;font-weight:500;width:100%;padding:0;}
  .card input.ci:focus{outline:none;border-bottom:1px solid var(--indigo);}
  .card textarea.cb{width:100%;border:none;background:none;resize:vertical;font-family:'Newsreader';font-size:15px;line-height:1.55;color:#2B3A42;min-height:44px;}
  .card textarea.cb:focus{outline:none;}
  .tag{font-family:'IBM Plex Mono';font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:4px;}
  .tag.outline{background:var(--indigo-soft);color:var(--indigo);}
  .tag.writing{background:var(--sage-soft);color:var(--sage);}
  .tag.manual{background:#EDF0F2;color:var(--muted);}

  /* character grid */
  .char-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media(max-width:640px){.char-grid{grid-template-columns:1fr;}}

  /* editor panel */
  .editor-panel{border:1px solid var(--red-soft);background:linear-gradient(180deg,#fff, #F5F8FA);border-radius:12px;padding:16px;position:sticky;top:120px;}
  .editor-panel h3{font-size:16px;margin:0 0 4px;color:var(--red);}
  .editor-panel .ed-sub{font-size:12px;color:var(--muted);margin-bottom:12px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 10px;font-size:12px;color:var(--muted);}
  .chip.on{background:var(--red);border-color:var(--red);color:#fff;}
  .ed-out{margin-top:12px;font-family:'Newsreader';font-size:14.5px;line-height:1.6;white-space:pre-wrap;color:#2B3A42;border-top:1px dashed #D7E0E4;padding-top:12px;}

  /* plot arc */
  .arc-wrap{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:16px 18px 8px;margin-bottom:18px;box-shadow:var(--shadow);}
  .arc-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .arc-head .t{font-family:'Fraunces';font-size:15px;}
  .arc-empty{color:var(--muted);font-size:13px;font-family:'Newsreader';font-style:italic;padding:30px 0;text-align:center;}

  .qa-block{border-left:2px solid var(--indigo-soft);padding:2px 0 2px 16px;margin-bottom:14px;}
  .qa-q{font-family:'Fraunces';font-size:16px;margin-bottom:6px;}
  .qa-a{font-family:'Newsreader';font-size:15px;color:#2B3A42;background:#F1F4F5;border-radius:8px;padding:8px 12px;}

  .empty{border:1px dashed var(--line);border-radius:12px;padding:34px;text-align:center;color:var(--muted);font-family:'Newsreader';}
  .empty .big{font-size:16px;color:var(--ink);margin-bottom:4px;font-family:'Fraunces';}

  .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
  .wc{font-family:'IBM Plex Mono';font-size:11px;color:var(--muted);margin-top:8px;}

  /* modal */
  .overlay{position:fixed;inset:0;background:rgba(32,30,26,.4);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:var(--panel);border-radius:16px;padding:26px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal h2{font-size:22px;margin:0 0 4px;}
  .modal p.m{color:var(--muted);font-size:13px;margin:0 0 18px;}
  .modal label{font-size:13px;font-weight:500;display:block;margin-bottom:6px;}
  .modal input, .modal select{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px 12px;font-size:14px;margin-bottom:14px;}
  .privacy{font-size:11.5px;color:var(--muted);background:var(--sage-soft);border-radius:8px;padding:10px 12px;line-height:1.5;}
  .keyhelp{margin:-6px 0 14px;}
  .keyhelp summary{cursor:pointer;font-size:12.5px;color:var(--indigo);font-weight:500;list-style:none;user-select:none;}
  .keyhelp summary::-webkit-details-marker{display:none;}
  .keyhelp summary:hover{text-decoration:underline;}
  .keyhelp[open] summary{margin-bottom:8px;}
  .keyhelp-body{font-size:12.5px;color:var(--ink);line-height:1.55;background:var(--indigo-soft);border:1px solid #c9e3e0;border-radius:10px;padding:12px 14px;}
  .keyhelp-body p{margin:0 0 8px;}
  .keyhelp-body ol{margin:0 0 8px;padding-left:20px;}
  .keyhelp-body li{margin-bottom:6px;}
  .keyhelp-note{font-size:11.5px;color:var(--muted);border-top:1px solid #c9e3e0;padding-top:8px;margin-top:2px!important;}
  .key-status{font-size:12px;display:inline-flex;align-items:center;gap:6px;color:var(--muted);}
  .key-dot{width:8px;height:8px;border-radius:50%;background:#c9c2b3;}
  .key-dot.on{background:#4f9d6b;}

  .spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
  .spin.dark{border:2px solid rgba(51,64,122,.3);border-top-color:var(--indigo);}
  @keyframes sp{to{transform:rotate(360deg);}}
  .err{background:#FBECEA;border:1px solid #E7C6C1;color:#8A2E20;border-radius:8px;padding:9px 12px;font-size:12.5px;margin-top:10px;}
  .add-inline{display:flex;gap:8px;margin-top:10px;}
  .add-inline input{flex:1;border:1px solid var(--line);border-radius:9px;padding:9px 12px;font-size:14px;}

  /* world tab */
  .world-cat{margin-bottom:22px;}
  .cat-label{font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--sage);border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:12px;}
  .upload-row{border:1px dashed #C4CDD2;border-radius:12px;padding:16px;background:#fff;margin-bottom:16px;}
  .upload-row .ur-head{font-family:'Fraunces';font-size:15px;margin-bottom:4px;}
  .upload-row .ur-sub{font-size:12.5px;color:var(--muted);margin-bottom:12px;}
  .file-btn{display:inline-block;border:1px solid var(--line);background:var(--panel);border-radius:9px;padding:9px 15px;font-size:13px;font-weight:500;cursor:pointer;}
  .file-btn:hover{border-color:var(--indigo);}
  .world-select{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;max-width:100%;}
</style>
</head>

/* ---------- Anthropic direct-browser call using the user's key ---------- */
async function callClaude({apiKey, model, system, prompt, documents=[], maxTokens=1600}){
  if(!apiKey) throw new Error("NO_KEY");
  const content = documents.length
    ? [...documents.map(d=>({type:"document", source:{type:"base64", media_type:"application/pdf", data:d}})), {type:"text", text:prompt}]
    : prompt;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": apiKey,
      "anthropic-version":"2023-06-01",
      "anthropic-dangerous-direct-browser-access":"true"
    },
    body: JSON.stringify({
      model, max_tokens:maxTokens,
      system: system || undefined,
      messages:[{role:"user", content}]
    })
  });
  if(!res.ok){
    let detail=""; try{ detail=(await res.json()).error?.message||""; }catch(e){}
    throw new Error("API " + res.status + (detail?": "+detail:""));
  }
  const data = await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}
function parseJSON(text){
  const clean = text.replace(/```json/gi,"").replace(/```/g,"").trim();
  const s = clean.indexOf("["), e = clean.lastIndexOf("]");
  const so = clean.indexOf("{"), eo = clean.lastIndexOf("}");
  let slice = clean;
  if(s!==-1 && (so===-1 || s<so)) slice = clean.slice(s, e+1);
  else if(so!==-1) slice = clean.slice(so, eo+1);
  return JSON.parse(slice);
}

/* read an uploaded file into text (or a base64 pdf for the API) */
function fileToBase64(file){
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=()=>rej(new Error("Could not read file.")); r.readAsDataURL(file); });
}
async function readUpload(file){
  const n = file.name.toLowerCase();
  if(n.endsWith(".txt")||n.endsWith(".md")||n.endsWith(".markdown")) return {text: await file.text()};
  if(n.endsWith(".docx")){
    const buf = await file.arrayBuffer();
    const r = await window.mammoth.extractRawText({arrayBuffer:buf});
    return {text: r.value};
  }
  if(n.endsWith(".pdf")) return {pdf: await fileToBase64(file)};
  throw new Error("Use a .txt, .md, .docx, or .pdf file.");
}

/* format scaffolding for the Writing tab */
function scaffold(type){
  switch(type){
    case "screenplay": return "FADE IN:\n\nINT. LOCATION - DAY\n\nAction lines: present tense, only what we SEE and HEAR. Keep them lean.\n\nCHARACTER NAME\n(parenthetical, only when the read is ambiguous)\nDialogue sits beneath the character cue.\n\nSECOND CHARACTER\nShort back-and-forth keeps the page moving.\n\nCUT TO:\n\nEXT. ANOTHER LOCATION - NIGHT\n\nA new slugline for every new place or time.\n\nFADE OUT.\n";
    case "play": return "ACT ONE\n\nSCENE 1\n\nSETTING: The stage picture, in one or two lines.\n\nAT RISE: What the audience sees happening as lights come up.\n\nCHARACTER NAME\nDialogue runs the full width of the page beneath the name in caps.\n\n(Stage directions sit in parentheses, set apart from dialogue. CHARACTER NAMES are capitalized inside them.)\n\nSECOND CHARACTER\nEach new speaker gets their own name line.\n\n(BLACKOUT)\n(END OF SCENE)\n";
    case "poetry": return "Title\n\nFirst stanza, first line\nsecond line\n\nSecond stanza\n";
    case "journal": return new Date().toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"}) + "\n\n";
    case "howto": return "The idea in one sentence.\n\nWhy it matters.\n\nThe steps:\n1. \n2. \n3. \n\n";
    default: return "";
  }
}

  "Young Adult":{demand:4,competition:5,words:[50000,80000],note:"Big but crowded; voice and emotional stakes carry it."},

const genreInfo = (g)=>MARKET[g] || MARKET["Other"];

function wordCountOf(project){
  const wc = (arr)=>(arr||[]).reduce((s,x)=> s + (x.content && x.content.trim()? x.content.trim().split(/\s+/).length : 0), 0);
  return wc(project.sections) + wc(project.scenes);
}
// Honest "market readiness": part genre-fit, part craft-signals from the project itself. 0-100 with transparent factors.
function marketReadiness(project){
  const info = genreInfo(project.genre);
  const words = wordCountOf(project);
  const [lo,hi] = info.words;
  const lengthFit = words<=0 ? 0 : Math.max(0, Math.min(1, words<lo ? words/lo : words>hi*1.4 ? 0.7 : 1));
  const hasArmature = project.armature && project.armature.trim().length>8 ? 1 : 0;   // knows its point
  const hasStructure = Math.min(1, (project.chapters||[]).length/8);                   // shaped
  const hasCast = Math.min(1, (project.characters||[]).length/4);                      // peopled
  const hasWorld = Math.min(1, (project.world||[]).length/6);                          // grounded
  const demandW = info.demand/5;
  const factors = [
    {k:"Genre demand", v:demandW},
    {k:"Length fit", v:lengthFit},
    {k:"Clear point (armature)", v:hasArmature},
    {k:"Structure", v:hasStructure},
    {k:"Characters", v:hasCast},
    {k:"World grounding", v:hasWorld},
  ];
  const weights=[0.22,0.18,0.18,0.16,0.14,0.12];
  const score = Math.round(factors.reduce((s,f,i)=>s+f.v*weights[i],0)*100);
  return {score, factors, info, words};
}
const readinessLabel = (s)=> s>=75?"Market-ready shape":s>=55?"Coming together":s>=35?"Early but promising":"Just getting started";

const targetFor = (project)=> (project.targetWords && project.targetWords>0) ? project.targetWords : genreInfo(project.genre).words[1];
function draftProgress(project){
  const words=wordCountOf(project); const target=targetFor(project);
  return {words, target, pct: target>0? Math.min(100, Math.round(words/target*100)) : 0};
}
// heuristic "what should I do next" — no API, always answers "what now?"
function nextStep(project){
  const dp=draftProgress(project);
  const drafted=(project.sections||[]).filter(s=>s.content&&s.content.trim()).length;
  if(!project.armature || project.armature.trim().length<8) return {do:"Name what your story is about", to:"outline", hint:"Set your armature — it sharpens everything else."};
  if((project.chapters||[]).length<3) return {do:"Shape your Story Spine", to:"outline", hint:"Sketch the seven beats, or generate an outline."};
  if((project.characters||[]).length<2) return {do:"Add your main characters", to:"characters", hint:"Even two or three gives the story a spine of people."};
  if(project.category==="fiction" && (project.world||[]).length<3) return {do:"Ground your world", to:"world", hint:"A few key places or rules make it real."};
  if(drafted===0) return {do:"Write your first pages", to:"writing", hint:"Open the Writing tab and begin — Inspire Me is there if you stall."};
  if(dp.pct<60) return {do:"Keep drafting", to:"writing", hint:`You're ${dp.pct}% to your ${dp.target.toLocaleString()}-word goal.`};
  return {do:"Sharpen it", to:"writing", hint:"Run a continuity check and the armature test to tighten what you have."};
}

const WORD_MILESTONES=[
  [1000,  (t)=>`1,000 words — ${t} is officially underway. Most stories never make it this far. Yours did.`],
  [5000,  (t)=>`5,000 words. You're past the tinkering stage — this is a real draft now.`],

// returns {key, msg} for the first uncelebrated milestone, else null
function detectMilestone(project, total){
  const ms=project.milestones||{};
  for(const [n,f] of WORD_MILESTONES){ if(total>=n && !ms["w"+n]) return {key:"w"+n, msg:f(project.title)}; }
  const firstChapter=(project.sections||[]).some(s=>s.content && s.content.trim().split(/\s+/).length>=200);
  if(firstChapter && !ms.firstchapter) return {key:"firstchapter", msg:"First chapter drafted — the hardest pages in any book are behind you."};
  if(draftProgress(project).pct>=100 && !ms.draftdone) return {key:"draftdone", msg:`Draft complete. Breathe. Then comes the joy of making ${project.title} shine.`};
  return null;
}

const PUB_STEPS=[
  {k:"draft",  auto:true, title:"Finish your draft", desc:"The whole path starts here — and it's the only step this room tracks for you automatically."},
  {k:"revise", title:"Revision passes", desc:"Work through your Review tab: continuity flags, editorial notes, the armature test. Two or three passes is normal — it's sculpting, not fixing."},
  {k:"beta",   title:"Beta readers", desc:"3–5 readers who love your genre. Ask them where they got bored, confused, or thrilled — not whether they 'liked it.'"},
  {k:"edit",   title:"Outside editing", desc:"Optional but powerful. A copyedit catches what your eyes skip; a developmental edit stress-tests the story. Budget-friendly options exist at every tier."},
  {k:"blurb",  title:"Title, blurb & keywords", desc:"Your back-cover blurb sells the promise, not the plot. Your logline in the Outline tab is a head start."},
  {k:"cover",  title:"Cover design", desc:"Readers absolutely judge books by covers — a genre-appropriate cover is marketing, not decoration. Commission or use a reputable premade."},
  {k:"format", title:"Interior formatting", desc:"Clean margins, front/back matter, chapter styling. Tools like Kindle Create, Atticus, or Vellum handle most of it."},
  {k:"platform",title:"Platform & pricing", desc:"KDP is the common start (paperback + ebook); IngramSpark widens store reach. Price within your genre's normal band."},
  {k:"launch", title:"Launch plan", desc:"A simple one beats a perfect one: a launch date, a handful of early reviews, and telling your actual circles. Momentum builds from there."}
];
function publishReadiness(project){
  const dp=draftProgress(project).pct/100;
  const reviews=project.reviews||[];
  const revScore = reviews.length ? reviews.filter(r=>r.status!=="open").length/reviews.length : 0.6;
  const mr=marketReadiness(project).score/100;
  const manual=PUB_STEPS.filter(s=>!s.auto);
  const clScore = manual.filter(s=>(project.pubChecklist||{})[s.k]).length / manual.length;
  const score=Math.round((dp*0.40 + revScore*0.15 + mr*0.20 + clScore*0.25)*100);
  return {score, parts:[["Draft complete",dp],["Checks resolved",revScore],["Market shape",mr],["Publishing steps",clScore]]};
}

const _esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
function _run(text, p={}){
  const rpr=[]; if(p.b)rpr.push("<w:b/>"); if(p.i)rpr.push("<w:i/>");
  if(p.color)rpr.push(`<w:color w:val="${p.color}"/>`);
  if(p.sz)rpr.push(`<w:sz w:val="${p.sz}"/><w:szCs w:val="${p.sz}"/>`);
  const rprXml=rpr.length?`<w:rPr>${rpr.join("")}</w:rPr>`:"";
  const runs=String(text).split("\n").map((t,i)=>(i>0?"<w:br/>":"")+`<w:t xml:space="preserve">${_esc(t)}</w:t>`).join("");
  return `<w:r>${rprXml}${runs}</w:r>`;
}
const _para=(r,ppr="")=>`<w:p>${ppr}${r}</w:p>`;
function _blockToDocx(b){

    case "h1": return _para(_run(b.text,{b:true,sz:32}),`<w:pPr><w:spacing w:before="240" w:after="120"/></w:pPr>`);
    case "h2": return _para(_run(b.text,{b:true,sz:26}),`<w:pPr><w:spacing w:before="160" w:after="60"/></w:pPr>`);
    case "meta": return _para(_run(b.text,{i:true,sz:18,color:"808080"}));
    case "bullet": return _para(_run("•  "+b.text,{sz:22}),`<w:pPr><w:ind w:left="360"/></w:pPr>`);
    case "rule": return _para(_run("———",{color:"BBBBBB"}),`<w:pPr><w:jc w:val="center"/></w:pPr>`);
    default: return String(b.text||"(empty)").split(/\n\n+/).map(t=>_para(_run(t,{sz:22}),`<w:pPr><w:spacing w:after="120"/></w:pPr>`)).join("");
  }
}
function _docXml(blocks){
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>${blocks.map(_blockToDocx).join("")}<w:sectPr><w:pgSz w:w="12240" w:h="15840"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440"/></w:sectPr></w:body></w:document>`;
}
const _crcTable=(()=>{let c,t=[];for(let n=0;n<256;n++){c=n;for(let k=0;k<8;k++)c=c&1?0xEDB88320^(c>>>1):c>>>1;t[n]=c>>>0;}return t;})();

function _zipStore(files){

  const u16=n=>[n&0xFF,(n>>8)&0xFF]; const u32=n=>[n&0xFF,(n>>8)&0xFF,(n>>16)&0xFF,(n>>24)&0xFF];
  for(const f of files){
    const name=enc.encode(f.name); const data=enc.encode(f.data); const crc=_crc32(data);
    const local=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0x21),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0));
    chunks.push(Uint8Array.from(local),name,data);
    central.push({name,crc,size:data.length,offset}); offset+=local.length+name.length+data.length;
  }
  const cdStart=offset;

    const rec=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0x21),u32(c.crc),u32(c.size),u32(c.size),u16(c.name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(c.offset));
    chunks.push(Uint8Array.from(rec),c.name); offset+=rec.length+c.name.length;

  chunks.push(Uint8Array.from(eocd));

}

}
function blocksToMd(blocks){

      case "h1": return `\n## ${b.text}`;

function slug(s){ return (String(s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,40))||"export"; }
function subjectBlocks(project, subject){

  b.push({t:"title", text: subject==="everything"? project.title : `${project.title} — ${label}`});
  const addOutline=(h)=>{ if(!project.chapters.length)return; if(h)b.push({t:"h1",text:"Outline"}); project.chapters.forEach(c=>{ b.push({t:"h2",text:c.title}); if(c.summary)b.push({t:"p",text:c.summary}); }); };
  const addChars=(h)=>{ if(!project.characters.length)return; if(h)b.push({t:"h1",text:"Characters"}); ["main","supporting","ancillary"].forEach(tier=>{ project.characters.filter(c=>((["main","supporting","ancillary"].includes(c.tier)?c.tier:"supporting"))===tier).forEach(c=>{ b.push({t:"h2",text:c.name+" ("+tier+")"}); if(c.role)b.push({t:"meta",text:c.role}); if(c.notes)b.push({t:"p",text:c.notes}); const depth=[["Want",c.want],["Need",c.need],["Flaw",c.flaw],["Arc",c.arc],["Voice",c.voice],["Relationships",c.relationships]].filter(x=>x[1]&&x[1].trim()); depth.forEach(d=>b.push({t:"bullet",text:d[0]+": "+d[1]})); }); }); };
  const addWorld=(h)=>{ if(!project.world.length)return; if(h)b.push({t:"h1",text:"World"}); WORLD_CATEGORIES.forEach(cat=>{ const items=project.world.filter(w=>w.category===cat); if(!items.length)return; b.push({t:"h2",text:cat}); items.forEach(w=>b.push({t:"p",text: w.detail?`${w.name} — ${w.detail}`:w.name})); }); };
  const addWriting=(h)=>{ if(!project.sections.length && !(project.scenes||[]).length)return; if(h)b.push({t:"h1",text:"Manuscript"}); project.sections.forEach(s=>{ b.push({t:"h2",text:s.title}); if(s.summary)b.push({t:"meta",text:"Summary: "+s.summary}); if(s.content)b.push({t:"p",text:s.content}); }); (project.scenes||[]).filter(s=>s.content&&s.content.trim()).forEach(s=>{ b.push({t:"h2",text:"Scene: "+s.title}); b.push({t:"p",text:s.content}); }); };

  else { if(project.premise){b.push({t:"meta",text:project.premise});} addWorld(true); addChars(true); addOutline(true); addWriting(true); }
  if(b.length<=1) b.push({t:"p",text:"Nothing here yet — this section is empty."});
  return b;
}
function download(filename, blob){ const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500); }
function printHTML(html){
  const iframe=document.createElement("iframe");
  Object.assign(iframe.style,{position:"fixed",right:"0",bottom:"0",width:"0",height:"0",border:"0"});
  document.body.appendChild(iframe);
  const d=iframe.contentWindow.document; d.open(); d.write(html); d.close();
  setTimeout(()=>{ try{ iframe.contentWindow.focus(); iframe.contentWindow.print(); }catch(e){} setTimeout(()=>iframe.remove(),1200); }, 400);
}
function runExport(project, subject, fmt){
  const blocks=subjectBlocks(project,subject); const base=slug(project.title)+"-"+subject;
  if(fmt==="docx") download(base+".docx", new Blob([buildDocx(blocks)],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"}));
  else if(fmt==="md") download(base+".md", new Blob([blocksToMd(blocks)],{type:"text/markdown"}));
  else printHTML(docHTML(blocks));
}

function App(){
  const [settings, setSettings] = useState(()=>store.get("ss_settings", {apiKey:"", model:"claude-sonnet-4-6", font:"sans"}));
  const [projects, setProjects] = useState(()=>{
    let list = store.get("ss_projects", null);
    if(!list){ // migrate a single old project if present
      const old = store.get("ss_project", null);
      list = old ? [{id:uid(), created:Date.now(), updated:Date.now(), genre:"", armature:"", ...old}] : [];
    }
    return list.map(p=>({world:[], sections:[], scenes:[], characters:[], chapters:[], qa:[], beats:[], spine:{}, spineBeats:null, reviews:[], wordLog:{}, milestones:{}, pubChecklist:{}, targetWords:0, editorFocus:["prose","grammar"], genre:"", armature:"", ...p}));
  });
  const [currentId, setCurrentId] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showExport, setShowExport] = useState(false);

  useEffect(()=>store.set("ss_settings", settings), [settings]);
  useEffect(()=>store.set("ss_projects", projects), [projects]);

  const project = projects.find(p=>p.id===currentId) || null;
  const upd = (patch)=>setProjects(list=>list.map(p=>p.id===currentId?{...p,...patch,updated:Date.now()}:p));
  const createProject = (data)=>{ const id=uid(); setProjects(list=>[...list,{id,created:Date.now(),updated:Date.now(),...data}]); setCurrentId(id); };
  const deleteProject = (id)=>setProjects(list=>list.filter(p=>p.id!==id));

  // ---- Backup / restore: the whole library to a portable .json file ----
  const backupAll = ()=>{
    const ok = window.confirm(
      "Before you back up — a quick reminder:\n\n"+
      "This file becomes the master copy. When you import it on another device, "+
      "the newest version of each project wins, so finish your edits on THIS device first.\n\n"+
      "Tip: finish a writing session on one device before switching to another — hand off, don't edit the same project in two places at once.\n\n"+
      "Ready to download the backup?"
    );
    if(!ok) return;
    const payload = { app:"anastasias-writing-room", version:1, exported:new Date().toISOString(), projects };
    const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0,10);
    a.href=url; a.download=`writing-room-backup-${stamp}.json`; a.click();
    setTimeout(()=>URL.revokeObjectURL(url), 1000);
  };
  const restoreAll = (file, mode, done)=>{
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const data = JSON.parse(r.result);
        const incoming = Array.isArray(data) ? data : data.projects;
        if(!Array.isArray(incoming)) throw new Error("This doesn't look like a Writing Room backup.");
        const norm = (p)=>({world:[], sections:[], scenes:[], characters:[], chapters:[], qa:[], beats:[], spine:{}, spineBeats:null, reviews:[], wordLog:{}, milestones:{}, pubChecklist:{}, targetWords:0, editorFocus:["prose","grammar"], genre:"", armature:"", ...p, id:p.id||uid()});
        if(mode==="replace"){
          setProjects(incoming.map(norm));
        }else{
          // smart merge: match incoming projects to existing ones BY TITLE.
          // Whichever side was edited more recently (by `updated`) becomes the live project.
          // The older side is never silently discarded — it's kept as a clearly-labeled
          // backup copy, since "more recently touched" isn't always "more complete"
          // (e.g. new characters added on one device, new pages written on another).
          const norm2 = (p)=>({...norm(p), id:uid()});
          const keyOf = (t)=>(t||"Untitled").trim().toLowerCase();
          setProjects(current=>{
            let result=[...current];
            const usedCurrentIds=new Set();
            incoming.forEach(raw=>{
              const inc = norm2(raw);
              const k = keyOf(inc.title);
              const matchIdx = result.findIndex((p,i)=>!usedCurrentIds.has(p.id) && keyOf(p.title)===k);
              if(matchIdx===-1){
                // no title match on this device — just add it as a new project
                result.push(inc);
              }else{
                const existing=result[matchIdx];
                usedCurrentIds.add(existing.id);
                const existingNewer = (existing.updated||0) >= (inc.updated||0);
                const winner = existingNewer ? existing : inc;
                const loser  = existingNewer ? inc : existing;
                const loserCopy = {...loser, id:uid(), title:(loser.title||"Untitled")+" (backup copy, "+new Date(loser.updated||Date.now()).toLocaleDateString()+")"};
                result[matchIdx] = winner;
                result.push(loserCopy);
              }
            });
            return result;
          });
        }
        done && done(null, incoming.length);
      }catch(e){ done && done(e.message||"Couldn't read that file."); }
    };
    r.onerror = ()=>done && done("Couldn't read that file.");
    r.readAsText(file);
  };

  const ai = useMemo(()=>({
    ready: !!settings.apiKey,
    run: (opts)=>callClaude({apiKey:settings.apiKey, model:settings.model, ...opts})
  }), [settings]);

  const [newFlow, setNewFlow] = useState(false); // show Setup for a brand-new project
  const [showWelcome, setShowWelcome] = useState(()=>!store.get("ss_welcomed", false));
  const dismissWelcome = ()=>{ store.set("ss_welcomed", true); setShowWelcome(false); };

  // gentle re-entry: how long since the last visit? (recorded once per load)
  const [awayDays] = useState(()=>{
    const last = store.get("ss_lastvisit", null);
    store.set("ss_lastvisit", Date.now());
    return last ? Math.floor((Date.now()-last)/86400000) : 0;
  });

  return (
    <div className={"app font-"+(settings.font||"sans")}>
      <div className="topbar">
        <div className="brand" style={{cursor:"pointer"}} onClick={()=>{setCurrentId(null);setNewFlow(false);}}>
          <img className="brand-mark" src={LOGO_ICON} alt="Anastasia's Writing Room logo" width="34" height="34" />
          <div className="brand-text">
            <span className="logo">Anastasia's Writing Room</span>
            <span className="sub">plan · world · characters · write</span>
          </div>
        </div>
        <div className="topbar-actions">
          {project && <span className="proj-chip">{project.title} · {typeLabel(project.type)}</span>}
          <span className="key-status"><span className={"key-dot"+(settings.apiKey?" on":"")}></span>{settings.apiKey?"AI on":"AI off"}</span>
          {(project||newFlow) && <button className="btn btn-ghost btn-sm" onClick={()=>{setCurrentId(null);setNewFlow(false);}}>← All projects</button>}
          {project && <button className="btn btn-sm" onClick={()=>setShowExport(true)}>Export</button>}
          <button className="btn btn-sm" onClick={()=>setShowSettings(true)}>{iGear} Settings</button>
        </div>
      </div>

      {project
        ? <Workspace project={project} upd={upd} ai={ai} openSettings={()=>setShowSettings(true)} />
        : newFlow
          ? <Setup onDone={(data)=>{createProject(data);setNewFlow(false);}} onCancel={()=>setNewFlow(false)} />
          : <Dashboard projects={projects} open={setCurrentId} onNew={()=>setNewFlow(true)} onDelete={deleteProject} onBackup={backupAll} onRestore={restoreAll} awayDays={awayDays} />
      }

      {showSettings && <SettingsModal settings={settings} setSettings={setSettings} close={()=>setShowSettings(false)} onBackup={backupAll} onRestore={restoreAll} />}
      {showExport && project && <ExportModal project={project} close={()=>setShowExport(false)} />}
      {showWelcome && <WelcomeModal onClose={dismissWelcome} />}

      <footer className="room-footer">
        <span>Made with care by Anastasia · <a href={LINKEDIN_URL} target="_blank" rel="noopener">LinkedIn</a></span>
        {SUPPORT_URL
          ? <span> · If this room helps you write, you can <a href={SUPPORT_URL} target="_blank" rel="noopener">leave a tip toward more coffee &amp; more features</a> ☕ — never required, always appreciated.</span>
          : null}
      </footer>
    </div>
  );
}

// draw a shareable 1080x1080 progress card and download it as PNG (all local)
function downloadProgressCard(p){
  const c=document.createElement("canvas"); c.width=1080; c.height=1080;
  const x=c.getContext("2d");
  x.fillStyle="#F3EFE7"; x.fillRect(0,0,1080,1080);
  const g=x.createRadialGradient(880,120,60,880,120,700); g.addColorStop(0,"rgba(251,239,217,.9)"); g.addColorStop(1,"rgba(251,239,217,0)");
  x.fillStyle=g; x.fillRect(0,0,1080,1080);
  x.fillStyle="#0F766E"; x.fillRect(0,0,1080,14);
  x.fillStyle="#6B6357"; x.font="500 30px Inter, sans-serif"; x.fillText("CURRENTLY WRITING", 90, 150);
  x.fillStyle="#221E17"; x.font="600 84px Fraunces, Georgia, serif";
  const title=(p.title||"Untitled").slice(0,22); x.fillText(title, 90, 260);
  if(p.genre){ x.fillStyle="#0F766E"; x.font="500 34px Inter, sans-serif"; x.fillText(p.genre+" · "+typeLabel(p.type), 90, 320); }
  const w=wordCountOf(p);
  x.fillStyle="#221E17"; x.font="600 170px Fraunces, Georgia, serif"; x.fillText(w.toLocaleString(), 90, 560);
  x.fillStyle="#6B6357"; x.font="500 40px Inter, sans-serif"; x.fillText("words and counting", 92, 625);
  const days=daysAllTime(p.wordLog);
  const drafted=(p.sections||[]).filter(s=>s.content&&s.content.trim()).length;
  x.font="500 36px Inter, sans-serif"; x.fillStyle="#221E17";
  x.fillText(`${days} day${days===1?"":"s"} showed up  ·  ${drafted} ${unitName(p.type).toLowerCase()}${drafted===1?"":"s"} drafted`, 90, 720);
  const pct=draftProgress(p).pct;
  x.fillStyle="#E2DBCE"; x.fillRect(90,780,900,26);
  x.fillStyle="#0F766E"; x.fillRect(90,780,Math.round(900*pct/100),26);
  x.fillStyle="#6B6357"; x.font="500 30px Inter, sans-serif"; x.fillText(pct+"% of the way to a finished draft", 90, 850);
  x.fillStyle="#9A8F7E"; x.font="italic 30px Newsreader, Georgia, serif";
  x.fillText("Written in Anastasia's Writing Room — where the words stay mine.", 90, 990);
  const a=document.createElement("a");
  a.download=(p.title||"story").toLowerCase().replace(/[^a-z0-9]+/g,"-")+"-progress.png";
  a.href=c.toDataURL("image/png"); a.click();
}

function Dashboard({projects, open, onNew, onDelete, onBackup, onRestore, awayDays}){

  list = list.slice().sort((a,b)=>{
    if(sort==="updated") return (b.updated||0)-(a.updated||0);
    if(sort==="words") return wordCountOf(b)-wordCountOf(a);
    if(sort==="title") return (a.title||"").localeCompare(b.title||"");

              </div>

          );
        })}
