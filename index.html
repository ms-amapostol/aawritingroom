        Used as inspiration, in our own words — not affiliated with or endorsed by the author. If this room helps you, please support his book.
      </div>
    </div>
  );
}

/* ---------------- SETUP FLOW ---------------- */
function Setup({onDone, onCancel}){
  const [step, setStep] = useState(0);
  const [category, setCategory] = useState(null);
  const [type, setType] = useState(null);
  const [title, setTitle] = useState("");
  const [premise, setPremise] = useState("");
  const [genre, setGenre] = useState("");
  const [armature, setArmature] = useState("");

  return (
    <div className="content">
      <div className="setup">
        <div className="steps-dots" style={{marginBottom:20}}>
          {[0,1,2].map(i=><span key={i} className={"dot"+(i<=step?" on":"")}></span>)}
        </div>

        {step===0 && (
          <div>
            <div className="eyebrow mono">Step 1</div>
            <h2>What are you writing?</h2>
            <p className="lede">This shapes the formatting, the outline prompts, and how the editor reads your work.</p>
            <div className="choice-grid">
              <button className={"choice-card"+(category==="fiction"?" selected":"")} onClick={()=>{setCategory("fiction");setType(null);}}>
                <div className="t">Fiction</div>
                <div className="d">Invented characters, worlds, and events.</div>
              </button>
              <button className={"choice-card"+(category==="nonfiction"?" selected":"")} onClick={()=>{setCategory("nonfiction");setType(null);}}>
                <div className="t">Nonfiction</div>
                <div className="d">True stories, lives, ideas, and instruction.</div>
              </button>
            </div>
            <div className="setup-nav">
              <button className="btn btn-ghost" onClick={onCancel}>← Dashboard</button>
              <button className="btn btn-primary" disabled={!category} onClick={()=>setStep(1)}>Continue</button>
            </div>
          </div>
        )}

        {step===1 && (
          <div>
            <div className="eyebrow mono">Step 2</div>
            <h2>What form does it take?</h2>
            <p className="lede">Pick the closest match — you can freewrite regardless of what you choose.</p>
            <div className="choice-grid">
              {TYPES[category].map(o=>(
                <button key={o.id} className={"choice-card"+(type===o.id?" selected":"")} onClick={()=>setType(o.id)}>
                  <div className="t">{o.t}</div>
                  <div className="d">{o.d}</div>
                </button>
              ))}
            </div>
            <div className="setup-nav">
              <button className="btn btn-ghost" onClick={()=>setStep(0)}>Back</button>
              <button className="btn btn-primary" disabled={!type} onClick={()=>setStep(2)}>Continue</button>
            </div>
          </div>
        )}

        {step===2 && (
          <div>
            <div className="eyebrow mono">Step 3</div>
            <h2>Name it, and find its heartbeat.</h2>
            <p className="lede">A working title is fine. Genre helps me read your market; the last question is the most important one you'll answer.</p>
            <div className="field">
              <label>Working title</label>
              <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Untitled" />
            </div>
            <div className="field">
              <label>Genre <span style={{color:"var(--muted)",fontWeight:400}}>— for your market read</span></label>
              <select value={genre} onChange={e=>setGenre(e.target.value)} style={{width:"100%",border:"1px solid var(--line)",borderRadius:10,padding:"11px 13px",fontSize:15,background:"var(--panel)"}}>
                <option value="">Choose a genre…</option>
                {GENRES[category].map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <div className="field">
              <label>Premise or seed <span style={{color:"var(--muted)",fontWeight:400}}>— optional</span></label>
              <textarea rows={2} value={premise} onChange={e=>setPremise(e.target.value)} placeholder="One or two lines about what happens." />
            </div>
            <div className="field">
              <label>What is this story really <em>about</em>? <span style={{color:"var(--muted)",fontWeight:400}}>— its point / armature</span></label>
              <textarea rows={2} value={armature} onChange={e=>setArmature(e.target.value)} placeholder='Not the plot — the point. e.g. "Chosen family can heal what blood family broke."' />
              <div style={{fontSize:12,color:"var(--muted)",marginTop:6,fontFamily:"Newsreader",fontStyle:"italic"}}>Brian McDonald calls this the armature — the idea your whole story is sculpted around. You can refine it later; even a rough guess helps everything else focus.</div>
            </div>
            <div className="note">
              <span>✎</span>
              <span>Your Writing Room organizes, sharpens, and encourages — but it never writes or changes your story. Every word stays yours. Prefer to write prose in Word? Use this just for planning; the Writing tab is optional.</span>
            </div>
            <div className="setup-nav">
              <button className="btn btn-ghost" onClick={()=>setStep(1)}>Back</button>
              <button className="btn btn-primary" onClick={()=>onDone({
                category, type, genre, armature: armature.trim(),
                title: title.trim()||"Untitled", premise: premise.trim(),
                outlineMode:"spine", outlineOpen:"", overview:"",
                firstLine:"", qa:[], beats:[], chapters:[], spine:{}, spineBeats:null, targetWords:0,
                characters:[], world:[], sections:[], scenes:[], editorFocus:["prose","grammar"], editorOut:""
              })}>Open the studio →</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

/* ---------------- WORKSPACE ---------------- */
function Workspace({project, upd, ai, openSettings}){
  const [tab, setTab] = useState("outline");
  const [focusCharId, setFocusCharId] = useState(null); // jump into Characters and open this one
  const [focusDoc, setFocusDoc] = useState(null);        // jump into Writing and open {kind:'chapters'|'scenes', id}

  const gotoCharacter = (id)=>{ setFocusCharId(id); setTab("characters"); };
  const gotoDoc = (kind,id)=>{ setFocusDoc({kind,id}); setTab("writing"); };

  // shared review log — every check (contradictions, editorial notes, armature, gaps) can file items here
  const reviews = project.reviews||[];
  const openReviews = reviews.filter(r=>r.status==="open").length;
  const logReview = (items)=>{
    if(!items || !items.length) return;
    const existing = project.reviews||[];
    const sig = (r)=> (r.kind+"|"+(r.text||"")).slice(0,160).toLowerCase();
    const seen = new Set(existing.map(sig));
    const fresh = items.filter(it=>!seen.has(sig(it))).map(it=>({id:uid(), status:"open", created:Date.now(), ...it}));
    if(fresh.length) upd({reviews:[...existing, ...fresh]});
    return fresh.length;
  };

  return (
    <div>
      <div className="tabs">
        <button className={"tab"+(tab==="outline"?" active":"")} onClick={()=>setTab("outline")}>Outline</button>
        <button className={"tab"+(tab==="characters"?" active":"")} onClick={()=>setTab("characters")}>
          Characters {project.characters.length>0 && <span className="badge">{project.characters.length}</span>}
        </button>
        <button className={"tab"+(tab==="world"?" active":"")} onClick={()=>setTab("world")}>
          World {project.world.length>0 && <span className="badge">{project.world.length}</span>}
        </button>
        <button className={"tab"+(tab==="writing"?" active":"")} onClick={()=>setTab("writing")}>Writing</button>
        <button className={"tab"+(tab==="review"?" active":"")} onClick={()=>setTab("review")}>
          Review {openReviews>0 && <span className="badge">{openReviews}</span>}
        </button>
        <button className={"tab"+(tab==="publish"?" active":"")} onClick={()=>setTab("publish")}>Publish</button>
      </div>
      <div className="content">
        {tab==="outline"    && <OutlineTab project={project} upd={upd} ai={ai} openSettings={openSettings} logReview={logReview} />}
        {tab==="characters" && <CharactersTab project={project} upd={upd} ai={ai} openSettings={openSettings} focusCharId={focusCharId} onFocusConsumed={()=>setFocusCharId(null)} onJumpToDoc={gotoDoc} />}
        {tab==="world"      && <WorldTab project={project} upd={upd} ai={ai} openSettings={openSettings} onJumpToDoc={gotoDoc} logReview={logReview} />}
        {tab==="writing"    && <WritingTab project={project} upd={upd} ai={ai} openSettings={openSettings} focusDoc={focusDoc} onFocusConsumed={()=>setFocusDoc(null)} onJumpToChar={gotoCharacter} logReview={logReview} />}
        {tab==="review"     && <ReviewTab project={project} upd={upd} onJumpToDoc={gotoDoc} onJumpToChar={gotoCharacter} setTab={setTab} />}
        {tab==="publish"    && <PublishTab project={project} upd={upd} setTab={setTab} ai={ai} openSettings={openSettings} />}
      </div>
    </div>
  );
}

/* ---------------- PUBLISH TAB — the business of writing, at your pace ---------------- */
function PublishTab({project, upd, setTab, ai, openSettings}){
  const pr=publishReadiness(project);
  const dp=draftProgress(project);
  const openR=(project.reviews||[]).filter(r=>r.status==="open").length;
  const checklist=project.pubChecklist||{};
  const toggle=(k)=>upd({pubChecklist:{...checklist,[k]:!checklist[k]}});
  const doneCount=PUB_STEPS.filter(s=>s.auto? dp.pct>=100 : checklist[s.k]).length;

  const [mkBusy,setMkBusy]=useState(false);
  const [auBusy,setAuBusy]=useState(false);
  const [perr,setPerr]=useState("");
  const mp=project.marketingPlan;
  const audit=project.salesAudit;
  const mkDone=project.marketingDone||{};
  const taskKey=(phase,t)=>phase+"|"+(t||"").slice(0,60);
  const toggleTask=(k)=>upd({marketingDone:{...mkDone,[k]:!mkDone[k]}});

  const bookBrief = ()=>`Title: "${project.title}" — ${typeLabel(project.type)}${project.genre?`, ${project.genre}`:""}.
What it's about (armature): ${project.armature||"(not defined yet)"}
${project.logline?`Logline: ${project.logline}`:""}
Premise: ${(project.premise||"").slice(0,400)}
Current length: ${wordCountOf(project).toLocaleString()} words (${dp.pct}% of target). Market-shape score: ${marketReadiness(project).score}/100.`;

  async function draftMarketing(){
    if(!ai.ready){ openSettings(); return; }
    setPerr(""); setMkBusy(true);
    try{
      const out=await ai.run({
        maxTokens:1900,
        system:"You are a marketing strategist for self-published authors with no existing platform and a small budget. Be realistic and specific to THIS book — no generic 'post on social media' filler. Everything is a suggestion the author will edit; never promise results. Return ONLY a JSON object.",
        prompt:`Draft a self-publishing marketing plan for this book:\n${bookBrief()}\n\nReturn: {"positioning":{"hook":"one sentence a reader would repeat to a friend","audience":"who this is for, specifically","comps":["2-3 comparable titles or authors those readers already love"]},"phases":[{"name":"Before launch (4–6 weeks out)","tasks":[{"t":"specific task","why":"one line on why it earns its time"}]},{"name":"Launch week","tasks":[...]},{"name":"First 90 days","tasks":[...]}],"channels":[{"name":"channel","why":"why it fits this book and a no-platform author"}],"keywords":["7 store-search keyword phrases readers would actually type"],"categories":["2-3 store categories where this can rank"]}\n3-5 tasks per phase. Favor free/cheap, compounding tactics.`
      });
      const j=parseJSON(out);
      if(j&&j.phases) upd({marketingPlan:j, marketingDone:{}});
      else setPerr("The plan came back garbled — try again.");
    }catch(e){ setPerr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setMkBusy(false);
  }

  async function runAudit(){
    if(!ai.ready){ openSettings(); return; }
    setPerr(""); setAuBusy(true);
    try{
      const out=await ai.run({
        maxTokens:1100,
        system:"You are an honest advisor to a self-published author. Assess how effectively this book could SELL via self-publishing — positioning, audience clarity, genre fit, hooks — based only on what's provided. Be candid but constructive; never crush motivation, never promise sales. Return ONLY a JSON object.",
        prompt:`Assess this book's selling position for self-publishing:\n${bookBrief()}\nPublishing steps done: ${doneCount}/${PUB_STEPS.length}. Open review items: ${openR}.\n\nReturn: {"readiness":"one honest paragraph on where the selling position stands today","basis":"2-3 sentences on how you formed this view: what signals you weighed (genre, positioning, length, readiness data) and what you cannot see from here (actual market response, luck, timing)","strengths":["2-3 genuine commercial strengths"],"risks":["2-3 honest risks or gaps"],"levers":[{"move":"highest-impact action available now","impact":"why it moves the needle"}]}\n2-3 levers max.`
      });
      const j=parseJSON(out);
      if(j&&j.readiness) upd({salesAudit:j});
      else setPerr("The assessment came back garbled — try again.");
    }catch(e){ setPerr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setAuBusy(false);
  }

  return (
    <div>
      <div className="section-head">
        <div><h2>The path to publishing</h2><div className="sub">Self-publishing, demystified — a map, not a deadline. Every step here is at your pace, and none of it changes what your story is. Finishing is the art; this is just the craft of sharing it.</div></div>
      </div>

      <div className="card" style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:10,flexWrap:"wrap",marginBottom:8}}>
          <span className="mono">Publishing readiness</span>
          <span style={{fontFamily:"'Fraunces'",fontSize:22}}>{pr.score}<span style={{fontSize:13,color:"var(--muted)"}}>/100</span></span>
        </div>
        {pr.parts.map(([k,v])=>(
          <div className="factor-row" key={k}>
            <span style={{minWidth:140}}>{k}</span>
            <div className="factor-bar"><i style={{width:Math.round(v*100)+"%"}}></i></div>
            <span className="mono" style={{minWidth:32,textAlign:"right"}}>{Math.round(v*100)}</span>
          </div>
        ))}
        <div className="score-note">A compass, not a gate — plenty of beloved books shipped "unready" by every measure. This just shows what's left when <em>you</em> decide it's time.{openR>0 && <> You have <button className="tb-goal" onClick={()=>setTab("review")}>{openR} open item{openR===1?"":"s"} in Review</button> if you want to work the checks-resolved bar.</>}</div>
      </div>

      <div className="mono" style={{marginBottom:8}}>The nine steps · {doneCount}/{PUB_STEPS.length}</div>
      {PUB_STEPS.map((st,i)=>{
        const done = st.auto ? dp.pct>=100 : !!checklist[st.k];
        return (
          <div className={"pub-step"+(done?" done":"")} key={st.k}>
            {st.auto
              ? <span className={"pub-auto"+(done?" on":"")} title="Tracked automatically from your draft progress">{done?"✓":dp.pct+"%"}</span>
              : <button className={"pub-check"+(done?" on":"")} onClick={()=>toggle(st.k)}>{done?"✓":""}</button>}
            <div style={{flex:1}}>
              <div className="pub-title">{i+1}. {st.title} {st.auto && <span className="mono" style={{fontSize:9}}>auto</span>}</div>
              <div className="pub-desc">{st.desc}</div>
            </div>
          </div>
        );
      })}
      <div style={{fontFamily:"'Newsreader'",fontStyle:"italic",fontSize:13,color:"var(--muted)",marginTop:14,lineHeight:1.6}}>
        One writer's note: the steps look long, but each is smaller than writing the book was — and you're doing that. Check them off as life allows.
      </div>

      <div className="section-head" style={{marginTop:30}}>
        <div><h2 style={{fontSize:22}}>Marketing, demystified</h2><div className="sub">A plan drafted for <em>this</em> book — realistic, low-budget, and yours to edit. Suggestions, never guarantees. {iSpark} = uses your API key.</div></div>
        <button className="btn btn-primary" disabled={mkBusy} onClick={draftMarketing}>
          {mkBusy? <><span className="spin"></span> Drafting…</> : (mp? <>↻ Redraft the plan</> : <>{iSpark} Draft my marketing plan</>)}
        </button>
      </div>

      {!mp && !mkBusy && <div className="empty">No plan yet. When you're ready, I'll read your title, genre, armature, and logline and draft a positioning + launch plan you can check off like the steps above. It works best once your armature and a few pages exist.</div>}

      {mp && (
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div className="mono" style={{marginBottom:6,color:"var(--indigo)"}}>Positioning</div>
            {mp.positioning?.hook && <div className="mk-hook">“{mp.positioning.hook}”</div>}
            {mp.positioning?.audience && <div style={{fontSize:13.5}}><b style={{fontWeight:600}}>Who it's for:</b> {mp.positioning.audience}</div>}
            {Array.isArray(mp.positioning?.comps)&&mp.positioning.comps.length>0 && <>
              <div className="mk-label">Readers who love</div>
              <div className="mk-chiprow">{mp.positioning.comps.map((c,i)=><span className="mk-chip" key={i}>{c}</span>)}</div>
            </>}
          </div>

          {(mp.phases||[]).map((ph,pi)=>(
            <div className="card" style={{marginBottom:12}} key={pi}>
              <div className="mono" style={{marginBottom:4,color:"var(--indigo)"}}>{ph.name}</div>
              {(ph.tasks||[]).map((t,ti)=>{ const k=taskKey(ph.name,t.t); const on=!!mkDone[k]; return (
                <div className={"mk-task"+(on?" done":"")} key={ti}>
                  <button className={"pub-check"+(on?" on":"")} onClick={()=>toggleTask(k)}>{on?"✓":""}</button>
                  <div><div className="mk-t">{t.t}</div>{t.why && <div className="mk-why">{t.why}</div>}</div>
                </div>
              );})}
            </div>
          ))}

          {(Array.isArray(mp.channels)&&mp.channels.length>0) && (
            <div className="card" style={{marginBottom:12}}>
              <div className="mono" style={{marginBottom:6,color:"var(--indigo)"}}>Where to show up</div>
              {mp.channels.map((c,i)=>(<div key={i} style={{marginBottom:6}}><b style={{fontWeight:600,fontSize:13.5}}>{c.name}</b><div className="mk-why">{c.why}</div></div>))}
            </div>
          )}

          {(Array.isArray(mp.keywords)&&mp.keywords.length>0) && (
            <div className="card" style={{marginBottom:12}}>
              <div className="mono" style={{marginBottom:6,color:"var(--indigo)"}}>Store keywords & categories</div>
              <div className="mk-chiprow">{mp.keywords.map((k,i)=><span className="mk-chip" key={i}>{k}</span>)}</div>
              {Array.isArray(mp.categories)&&mp.categories.length>0 && <>
                <div className="mk-label">Categories</div>
                <div className="mk-chiprow">{mp.categories.map((c,i)=><span className="mk-chip" key={i} style={{background:"var(--amber-soft)",borderColor:"#E9D4B4"}}>{c}</span>)}</div>
              </>}
              <div style={{fontSize:11.5,color:"var(--muted)",fontStyle:"italic",marginTop:8}}>Validate keywords in the store's search bar before committing — real autocomplete beats any suggestion.</div>
            </div>
          )}
        </div>
      )}

      <div className="section-head" style={{marginTop:30}}>
        <div><h2 style={{fontSize:22}}>How would this sell today?</h2><div className="sub">An informed view — not a certain prediction — of where your selling position stands today and the levers most likely to matter. {iSpark} marks anything that uses your API key.</div></div>
        <button className="btn" disabled={auBusy} onClick={runAudit}>
          {auBusy? <><span className="spin dark"></span> Assessing…</> : (audit? <>↻ Reassess</> : <>{iSpark} Assess my selling position</>)}
        </button>
      </div>

      {audit && (
        <div className="card">
          <div className="reading" style={{fontSize:15,lineHeight:1.6,marginBottom:10}}>{audit.readiness}</div>
          {audit.basis && (
            <div style={{background:"var(--sage-soft)",border:"1px solid #D7E0E4",borderRadius:8,padding:"8px 11px",marginBottom:10}}>
              <div className="mono" style={{marginBottom:3}}>How this view was formed</div>
              <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.5}}>{audit.basis}</div>
            </div>
          )}
          {Array.isArray(audit.strengths)&&audit.strengths.length>0 && <>
            <div className="mono" style={{color:"var(--sage)",margin:"8px 0 4px"}}>Working for you</div>
            {audit.strengths.map((x,i)=><div key={i} style={{fontSize:13.5,marginBottom:3}}>· {x}</div>)}
          </>}
          {Array.isArray(audit.risks)&&audit.risks.length>0 && <>
            <div className="mono" style={{color:"#B4472F",margin:"10px 0 4px"}}>Honest risks</div>
            {audit.risks.map((x,i)=><div key={i} style={{fontSize:13.5,marginBottom:3}}>· {x}</div>)}
          </>}
          {Array.isArray(audit.levers)&&audit.levers.length>0 && <>
            <div className="mono" style={{color:"var(--amber)",margin:"10px 0 4px"}}>Your biggest levers</div>
            {audit.levers.map((l,i)=><div key={i} style={{marginBottom:6}}><b style={{fontWeight:600,fontSize:13.5}}>{l.move}</b><div className="mk-why">{l.impact}</div></div>)}
          </>}
        </div>
      )}
      {perr && <div className="err">{perr}</div>}
    </div>
  );
}

/* ---------------- REVIEW TAB — the checks-and-balances repository ---------------- */
const REVIEW_KINDS = {
  contradiction:{label:"Continuity",   color:"#B4472F"},
  editorial:    {label:"Editorial note",color:"#123A55"},
  armature:     {label:"Armature drift",color:"#8A6D1F"},
  audience:     {label:"Reader door",  color:"#B9762F"}
};
const REVIEW_STATUS = [["open","Open"],["resolved","Resolved"],["backlog","Backlog"],["wontfix","Won't fix"]];

function ReviewTab({project, upd, onJumpToDoc, onJumpToChar, setTab}){
  const [statusFilter,setStatusFilter]=useState("open");
  const [kindFilter,setKindFilter]=useState("all");
  const reviews = project.reviews||[];
  const setStatus=(id,status)=>upd({reviews:reviews.map(r=>r.id===id?{...r,status}:r)});
  const del=(id)=>upd({reviews:reviews.filter(r=>r.id!==id)});
  const clearResolved=()=>upd({reviews:reviews.filter(r=>r.status==="open"||r.status==="backlog")});

  const counts={};
  REVIEW_STATUS.forEach(([s])=>counts[s]=reviews.filter(r=>r.status===s).length);
  const filtered=reviews.filter(r=>(statusFilter==="all"||r.status===statusFilter)&&(kindFilter==="all"||r.kind===kindFilter))
    .sort((a,b)=>(b.created||0)-(a.created||0));

  return (
    <div>
      <div className="section-head">
        <div><h2>Review</h2><div className="sub">Continuity flags, editorial notes, and armature-drift results file here automatically — so nothing worth fixing gets lost in the scroll. Resolve them, shelve them for later, or let them go. Nothing is ever changed for you.</div></div>
        {counts.resolved+ (reviews.filter(r=>r.status==="wontfix").length) > 0 && <button className="btn btn-ghost btn-sm" onClick={clearResolved}>Clear resolved &amp; won't-fix</button>}
      </div>

      <div className="rev-filters">
        <div className="rev-seg">
          {[["open","Open"],["backlog","Backlog"],["resolved","Resolved"],["wontfix","Won't fix"],["all","All"]].map(([s,l])=>(
            <button key={s} className={"seg-btn"+(statusFilter===s?" on":"")} onClick={()=>setStatusFilter(s)}>{l}{counts[s]?<span className="seg-n">{counts[s]}</span>:null}</button>
          ))}
        </div>
        <select className="world-select" value={kindFilter} onChange={e=>setKindFilter(e.target.value)}>
          <option value="all">All kinds</option>
          {Object.entries(REVIEW_KINDS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
        </select>
      </div>

      {filtered.length===0
        ? <div className="empty"><div className="big">{reviews.length===0?"Nothing filed yet":"Nothing here"}</div>{reviews.length===0?"Run a continuity check, get editorial notes, or an armature test — anything worth revisiting lands here so it's never lost in the chat.":"No items with this status. Try another filter."}</div>
        : filtered.map(r=>{
            const meta=REVIEW_KINDS[r.kind]||{label:r.kind,color:"var(--muted)"};
            return (
              <div className="rev-card" key={r.id}>
                <div className="rev-top">
                  <span className="rev-kind" style={{background:meta.color}}>{meta.label}</span>
                  {r.severity && <span className={"fsev sev-"+r.severity}>{r.severity}</span>}
                  {r.where && <span className="rev-where">{r.where}</span>}
                  <span className="rev-status-tag">{(REVIEW_STATUS.find(s=>s[0]===r.status)||[])[1]}</span>
                </div>
                <div className="rev-text">{r.text}</div>
                {r.detail && <div className="rev-detail">{r.detail}</div>}
                <div className="rev-actions">
                  {r.status!=="resolved" && <button className="btn btn-sm btn-primary" onClick={()=>setStatus(r.id,"resolved")}>Mark resolved</button>}
                  {r.status!=="backlog"  && <button className="btn btn-sm" onClick={()=>setStatus(r.id,"backlog")}>Backlog</button>}
                  {r.status!=="wontfix"  && <button className="btn btn-sm" onClick={()=>setStatus(r.id,"wontfix")}>Won't fix</button>}
                  {r.status!=="open"     && <button className="btn btn-sm btn-ghost" onClick={()=>setStatus(r.id,"open")}>Reopen</button>}
                  {r.docId && <button className="btn btn-sm btn-ghost" onClick={()=>onJumpToDoc(r.docKind||"chapters", r.docId)}>Go to pages →</button>}
                  <button className="btn btn-sm btn-ghost" style={{marginLeft:"auto"}} onClick={()=>del(r.id)}>Delete</button>
                </div>
              </div>
            );
          })}
    </div>
  );
}

/* helper: merge extracted characters without duplicating by name */
function mergeChars(existing, found, source){
  const out = [...existing];
  const okTier=(t)=>["main","supporting","ancillary"].includes(t)?t:"supporting";
  found.forEach(f=>{
    if(!f || !f.name) return;
    const hit = out.find(c=>c.name.toLowerCase().trim()===f.name.toLowerCase().trim());
    if(hit){
      if(!hit.role && f.role) hit.role=f.role;
      if((!hit.notes || hit.notes.length<10) && f.description) hit.notes=f.description;
      if(!hit.tier && f.tier) hit.tier=okTier(f.tier);
    } else {
      out.push({id:uid(), name:f.name, role:f.role||"", notes:f.description||"", tier:okTier(f.tier), source});
    }
  });
  return out;
}
function mergeChapters(existing, found){
  const out=[...existing];
  found.forEach(f=>{
    if(!f || !f.title) return;
    const hit=out.find(c=>c.title.toLowerCase().trim()===f.title.toLowerCase().trim());
    if(hit){ if((!hit.summary||hit.summary.length<8)&&f.summary) hit.summary=f.summary; }
    else out.push({id:uid(), title:f.title, summary:f.summary||""});
  });
  return out;
}

/* ---------------- OUTLINE TAB ---------------- */
function OutlineTab({project, upd, ai, openSettings, logReview}){
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const mode = (!project.outlineMode || project.outlineMode==="choose") ? "spine" : project.outlineMode;
  const setMode = (m)=>upd({outlineMode:m});

  const needKey = ()=>{ if(!ai.ready){ openSettings(); return true; } return false; };
  const okBeat = (k)=> beatsOf(project).some(b=>b.k===k) ? k : "";

  const outlineText = ()=>[
    project.premise, project.overview, project.outlineOpen, project.firstLine,
    ...project.qa.map(q=>`${q.q} ${q.a}`),
    ...project.chapters.map(c=>`${c.title}: ${c.summary}`)
  ].filter(x=>x && x.trim()).join("\n");

  async function createCharacters(silent){
    const text = outlineText();
    if(text.trim().length<15){ if(!silent){ if(needKey())return; setErr("Add some outline first — a premise, overview, or a few chapters."); } return; }
    if(!silent && needKey()) return;
    if(!ai.ready) return;
    if(!silent){ setErr(""); setBusy(true); }
    try{
      const out = await ai.run({
        maxTokens:1400,
        system:"You are a story developer who identifies and fleshes out characters from outline material. Return ONLY a JSON array, no prose.",
        prompt:`From this outline/premise of a ${typeLabel(project.type)} titled "${project.title}", identify AND flesh out every character — anyone named or clearly implied. For each return {"name","role","tier","description"} where role is their function (protagonist, mentor, antagonist, subject, narrator…), tier is "main" | "supporting" | "ancillary" based on their importance, and description is 1-2 sentences on who they are and their arc, reasonably inferred from the material. Return [] only if truly no people are present.\n\n"""${text.slice(0,7000)}"""`
      });
      const found = parseJSON(out);
      if(Array.isArray(found) && found.length){
        upd({characters: mergeChars(project.characters, found, "outline")});
      } else if(!silent){ setErr("Couldn't find any characters in the outline yet."); }
    }catch(e){ if(!silent) setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    if(!silent) setBusy(false);
  }

  async function genFromOverview(){
    if(needKey()) return;
    if(!project.overview.trim()){ setErr("Write an overview first."); return; }
    setErr(""); setBusy(true);
    try{
      const unit = unitName(project.type);
      const out = await ai.run({
        maxTokens:1800,
        system:"You are a developmental editor building a chapter/section outline mapped to the Story Spine. Return ONLY a JSON array.",
        prompt:`This is a ${typeLabel(project.type)} titled "${project.title}".${project.premise?` Premise: ${project.premise}.`:""}\n\nOverview from the author:\n"""${project.overview}"""\n\nProduce an ordered outline as JSON: an array of {"title","summary","beat"} where title is a ${unit} title, summary is 1-2 sentences, and "beat" is which Story Spine step it serves — one of: ${beatsOf(project).map(b=>`"${b.k}" (${b.step})`).join(", ")}. Choose a natural number of ${unit.toLowerCase()}s.`
      });
      const arr = parseJSON(out);
      upd({chapters: arr.map(c=>({id:uid(), title:c.title||"Untitled", summary:c.summary||"", beat:okBeat(c.beat)}))});
      createCharacters(true);
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setBusy(false);
  }

  async function guidedStep(answerText){
    if(needKey()) return;
    setErr(""); setBusy(true);
    const priorQA = [...project.qa];
    if(answerText!==undefined) priorQA[priorQA.length-1] = {...priorQA[priorQA.length-1], a:answerText};
    try{
      const convo = project.firstLine
        ? `Opening line: "${project.firstLine}"\n` + priorQA.map((x,i)=>`Q${i+1}: ${x.q}\nA${i+1}: ${x.a||"(unanswered)"}`).join("\n")
        : "";
      const out = await ai.run({
        maxTokens:1200,
        system:"You are a story-development coach. You ask ONE sharp follow-up question at a time to draw out the plot, and you track the emotional/tension arc so far. Return ONLY JSON.",
        prompt:`This is a ${typeLabel(project.type)} titled "${project.title}".\n\n${convo}\n\nReturn JSON: {"nextQuestion": "one focused follow-up question that builds on what's known", "beats": [{"label":"short beat name","tension": 0-100}]}. "beats" is the plot arc implied so far, in order, from setup to resolution — infer sensibly even if sparse. Tension = narrative stakes/intensity.`
      });
      const j = parseJSON(out);
      const newQA = [...priorQA, {q:j.nextQuestion, a:""}];
      upd({qa:newQA, beats: Array.isArray(j.beats)?j.beats:project.beats});
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setBusy(false);
  }

  async function outlineFromJourney(){
    if(needKey()) return;
    setErr(""); setBusy(true);
    try{
      const unit = unitName(project.type);
      const context = `Opening line: "${project.firstLine}"\n` +
        project.qa.map((x,i)=>`Q: ${x.q}\nA: ${x.a}`).join("\n") +
        `\nPlot beats: ${project.beats.map(b=>b.label).join(" → ")}`;
      const out = await ai.run({
        maxTokens:1800,
        system:"You are a developmental editor. Return ONLY a JSON array.",
        prompt:`Turn this developed premise into an ordered outline for a ${typeLabel(project.type)}.\n\n${context}\n\nReturn a JSON array of {"title","summary","beat"} where each is a ${unit}, summary is 1-2 sentences, and "beat" is the Story Spine step it serves — one of: ${beatsOf(project).map(b=>`"${b.k}"`).join(", ")}.`
      });
      const arr = parseJSON(out);
      upd({chapters: arr.map(c=>({id:uid(), title:c.title||"Untitled", summary:c.summary||"", beat:okBeat(c.beat)}))});
      createCharacters(true);
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setBusy(false);
  }

  const addShell = ()=>upd({chapters:[...project.chapters, {id:uid(), title:`${unitName(project.type)} ${project.chapters.length+1}`, summary:""}]});
  const editChapter = (id, patch)=>upd({chapters: project.chapters.map(c=>c.id===id?{...c,...patch}:c)});
  const delChapter = (id)=>upd({chapters: project.chapters.filter(c=>c.id!==id)});

  return (
    <div className="split">
      <div>
        <div className="section-head">
          <div><h2>Outline</h2><div className="sub">{mode==="spine"?"Your story's roadmap, beat by beat.":"Build it your way — feed the spine, or freeform it."}</div></div>
          <div style={{textAlign:"right"}}>
            <button className="btn btn-sm" disabled={busy} onClick={()=>createCharacters(false)}>
              {busy? <><span className="spin dark"></span> Working…</> : <>{iSpark} Create characters from outline</>}
            </button>
            <div style={{fontSize:11,color:"var(--muted)",marginTop:4,fontStyle:"italic",maxWidth:220}}>Runs automatically when you generate an outline — use this to re-scan anytime.</div>
          </div>
        </div>

        <div className="mode-row">
          <button className={"mode-btn"+(mode==="spine"?" on":"")} onClick={()=>setMode("spine")}>◆ Story Spine</button>
          <button className={"mode-btn"+(mode!=="spine"?" on":"")} onClick={()=>{ if(mode==="spine") setMode(project.overview?"overview":"overview"); }}>✎ Build your own</button>
        </div>

        {err && <div className="err">{err}</div>}

        {mode==="spine" && <SpineRoadmap project={project} upd={upd} ai={ai} openSettings={openSettings} logReview={logReview} />}

        {mode!=="spine" && (
        <div>
          <div className="sub" style={{margin:"-4px 0 14px",fontFamily:"'Newsreader'",fontStyle:"italic"}}>
            Overview and first-line generate chapters that slot into your Story Spine. Open freewrite and shells are pure freeform — ignore the spine entirely if you like.
          </div>
          <div className="mode-row">
            <button className={"mode-btn"+(mode==="overview"?" on":"")} onClick={()=>setMode("overview")}>Overview → chapters</button>
            <button className={"mode-btn"+(mode==="firstline"?" on":"")} onClick={()=>setMode("firstline")}>First line → journey</button>
            <button className={"mode-btn"+(mode==="open"?" on":"")} onClick={()=>setMode("open")}>Open freewrite</button>
            <button className={"mode-btn"+(mode==="shells"?" on":"")} onClick={()=>setMode("shells")}>Blank shells</button>
          </div>

        {mode==="open" && (
          <div>
            <textarea className="write-area" value={project.outlineOpen}
              onChange={e=>upd({outlineOpen:e.target.value})}
              placeholder={`Think out loud about your ${typeLabel(project.type).toLowerCase()}. Nothing here is binding.`} />
            <div className="toolbar">
              <button className="btn btn-sm" disabled={busy} onClick={()=>createCharacters(false)}>{iSpark} Create characters from this</button>
            </div>
          </div>
        )}

        {mode==="overview" && (
          <div>
            <div className="field">
              <label>Write an overview of the whole thing</label>
              <textarea className="write-area small" value={project.overview}
                onChange={e=>upd({overview:e.target.value})}
                placeholder="Beginning, middle, end — in whatever detail comes naturally. I'll turn it into a chapter-by-chapter outline." />
            </div>
            <button className="btn btn-primary" disabled={busy} onClick={genFromOverview}>
              {busy? <><span className="spin"></span> Building outline…</> : <>{iSpark} Generate {unitName(project.type).toLowerCase()} outline</>}
            </button>
          </div>
        )}

        {mode==="firstline" && (
          <div>
            <PlotArc beats={project.beats} />
            <div className="field">
              <label>What's the first line?</label>
              <div className="add-inline">
                <input value={project.firstLine} onChange={e=>upd({firstLine:e.target.value})}
                  placeholder="The line the reader sees before anything else." />
                <button className="btn btn-primary btn-sm" disabled={busy||!project.firstLine.trim()}
                  onClick={()=>{ if(project.qa.length===0) guidedStep(); }}>
                  {busy && project.qa.length===0? <span className="spin"></span> : "Begin"}
                </button>
              </div>
            </div>

            {project.qa.map((item, i)=>(
              <div className="qa-block" key={i}>
                <div className="qa-q">{item.q}</div>
                {i < project.qa.length-1
                  ? <div className="qa-a">{item.a||"—"}</div>
                  : <div>
                      <textarea className="write-area small" value={item.a}
                        onChange={e=>{ const qa=[...project.qa]; qa[i]={...qa[i],a:e.target.value}; upd({qa}); }}
                        placeholder="Your answer — the arc redraws as you go." />
                      <div className="toolbar">
                        <button className="btn btn-primary btn-sm" disabled={busy||!item.a.trim()} onClick={()=>guidedStep(item.a)}>
                          {busy? <><span className="spin"></span> Thinking…</> : "Answer & get next question"}
                        </button>
                        {project.qa.length>=3 &&
                          <button className="btn btn-sm" disabled={busy} onClick={outlineFromJourney}>{iSpark} Generate outline from this journey</button>}
                      </div>
                    </div>}
              </div>
            ))}
          </div>
        )}

        {mode==="shells" && (
          <div>
            <button className="btn btn-sm" onClick={addShell}>+ Add {unitName(project.type).toLowerCase()}</button>
            {project.chapters.length===0 && <div className="empty" style={{marginTop:14}}><div className="big">No {unitName(project.type).toLowerCase()}s yet</div>Add empty shells and fill them in yourself — no AI involved.</div>}
          </div>
        )}

        {/* rendered outline (shared by all modes that produce chapters) */}
        {project.chapters.length>0 && (
          <div style={{marginTop:24}}>
            <div className="mono" style={{marginBottom:10}}>{project.chapters.length} {unitName(project.type).toLowerCase()}s</div>
            {project.chapters.map((c,i)=>(
              <div className="card" key={c.id}>
                <div className="ct">
                  <input className="ci" value={c.title} onChange={e=>editChapter(c.id,{title:e.target.value})} />
                  <button className="btn btn-ghost btn-sm" onClick={()=>delChapter(c.id)}>✕</button>
                </div>
                <textarea className="cb" value={c.summary} onChange={e=>editChapter(c.id,{summary:e.target.value})}
                  placeholder="What happens here…" />
                <select className="world-select" style={{marginTop:8,fontSize:12}} value={c.beat||""} onChange={e=>editChapter(c.id,{beat:e.target.value})}>
                  <option value="">— unassigned to spine —</option>
                  {beatsOf(project).map(b=><option key={b.k} value={b.k}>{b.step}{b.act?` (${b.act})`:""}</option>)}
                </select>
              </div>
            ))}
            <button className="btn btn-sm" onClick={()=>upd({sections: project.chapters.map(c=>{
              const ex = project.sections.find(s=>s.title===c.title);
              return ex || {id:uid(), title:c.title, content:scaffold(project.type), summary:""};
            })})}>Send this outline to the Writing tab →</button>
          </div>
        )}
        </div>
        )}
      </div>

      <SideNote project={project} upd={upd} />
    </div>
  );
}

/* ---------------- STORY SPINE ROADMAP ---------------- */
function SpineRoadmap({project, upd, ai, openSettings, logReview}){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [showHow,setShowHow]=useState(false);
  const [armTest,setArmTest]=useState(null);
  const [armBusy,setArmBusy]=useState(false);
  const [pitchBusy,setPitchBusy]=useState(false);
  const [custom,setCustom]=useState(false);
  const [openSlots,setOpenSlots]=useState({}); // beat.k -> bool; collapsed by default
  const toggleSlot=(k)=>setOpenSlots(o=>({...o,[k]:!o[k]}));
  const spine = project.spine||{};
  const beats = beatsOf(project);
  const scenes = project.scenes||[];
  const framework = project.type==="poetry" ? "poetry" : project.type==="vignettes" ? "collection" : "story";
  const lowContent = ["journal","essay","howto"].includes(project.type);
  const setBeat=(k,v)=>upd({spine:{...spine,[k]:v}});

  // chapters managed right here in the spine
  const chapters=project.chapters||[];
  const addChapAt=(k)=>upd({chapters:[...chapters,{id:uid(),title:`${unitName(project.type)} ${chapters.length+1}`,summary:"",beat:k}]});
  const editChap=(id,patch)=>upd({chapters:chapters.map(c=>c.id===id?{...c,...patch}:c)});
  const delChap=(id)=>upd({chapters:chapters.filter(c=>c.id!==id)});
  const moveChap=(id,dir)=>{
    const i=chapters.findIndex(c=>c.id===id); const j=i+dir;
    if(i<0||j<0||j>=chapters.length) return;
    const next=[...chapters]; [next[i],next[j]]=[next[j],next[i]]; upd({chapters:next});
  };
  // scenes managed here too
  const addSceneAt=(k)=>upd({scenes:[...scenes,{id:uid(),title:`Scene ${scenes.length+1}`,content:"",beat:k,chapterId:""}]});
  const editScene=(id,patch)=>upd({scenes:scenes.map(s=>s.id===id?{...s,...patch}:s)});
  const delScene=(id)=>upd({scenes:scenes.filter(s=>s.id!==id)});

  // customizable beats
  const startCustomize=()=>{ if(!project.spineBeats||!project.spineBeats.length) upd({spineBeats:SPINE.map(b=>({...b}))}); setCustom(true); };
  const editBeatDef=(i,patch)=>{ const next=beatsOf(project).map((b,j)=>j===i?{...b,...patch}:b); upd({spineBeats:next}); };
  const addBeatDef=()=>upd({spineBeats:[...beatsOf(project),{k:uid(),act:"",step:"New beat…",purpose:""}]});
  const delBeatDef=(i)=>{ const next=beatsOf(project).filter((_,j)=>j!==i); upd({spineBeats:next}); };
  const resetBeats=()=>{ upd({spineBeats:null}); setCustom(false); };

  const pitchParts = beats.map(b=>spine[b.k]).filter(x=>x&&x.trim());
  const pitchWords = pitchParts.join(" ").trim().split(/\s+/).filter(Boolean).length;

  async function summarizePitch(){
    if(!ai.ready){ openSettings(); return; }
    if(pitchParts.length<2){ setErr("Fill in a few beats first — then I can distill them."); return; }
    setErr(""); setPitchBusy(true);
    try{
      const out=await ai.run({
        maxTokens:300,
        system:"You distill an author's own beat notes into a tight back-cover logline. Use THEIR facts and names only — invent nothing. 2-3 sentences, vivid and clean. Return only the logline text.",
        prompt:`${framework==="story"?"Story":"Collection"}: "${project.title}"${project.genre?` (${project.genre})`:""}. Its point: ${project.armature||"(not stated)"}.\n\nThe author's beats, in order:\n${beats.map(b=>spine[b.k]?`${b.step} ${spine[b.k]}`:"").filter(Boolean).join("\n")}\n\nWrite a 2-3 sentence logline that captures the hook and arc — the kind of blurb that goes on the back cover.`
      });
      upd({logline:out.trim()});
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setPitchBusy(false);
  }

  async function suggestSpine(){
    if(!ai.ready){ openSettings(); return; }
    setErr(""); setBusy(true);
    const ctx = [
      project.armature&&`Point/armature: ${project.armature}`,
      project.premise&&`Premise: ${project.premise}`,
      project.overview&&`Overview: ${project.overview}`,
      project.chapters.length&&`Chapters so far: ${project.chapters.map(c=>c.title+(c.summary?" — "+c.summary:"")).join(" | ")}`
    ].filter(Boolean).join("\n");
    try{
      const out = await ai.run({
        maxTokens:1400,
        system:"You help an author draft a STORY-PLANNING skeleton (not prose). Suggest one or two sentences per beat that the author will edit. Never write the actual story text. Return ONLY a JSON object.",
        prompt:`For this ${typeLabel(project.type)} titled "${project.title}", suggest beat-by-beat planning notes the author can edit. Return a JSON object with these keys, each a 1-2 sentence planning note (NOT prose from the story):\n${beats.map(b=>`"${b.k}" (${b.step} — ${b.purpose})`).join("\n")}\n\nWhat we know:\n${ctx||"(very little — make gentle, open suggestions)"}\n`
      });
      const j = parseJSON(out);
      const merged={...spine};
      beats.forEach(b=>{ if(j[b.k] && !merged[b.k]) merged[b.k]=j[b.k]; });
      upd({spine:merged});
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setBusy(false);
  }

  async function armatureTest(){
    if(!ai.ready){ openSettings(); return; }
    if(!project.armature || project.armature.trim().length<6){ setErr("Set your armature first — the test needs a point to measure against."); return; }
    if(!(project.chapters||[]).length){ setErr("Assign or generate some chapters first."); return; }
    setErr(""); setArmBusy(true); setArmTest(null);
    const chapters=project.chapters.map((c,i)=>`${i+1}. ${c.title}: ${c.summary||"(no summary)"}`).join("\n");
    try{
      const out=await ai.run({
        maxTokens:1600,
        system:"You test whether each chapter serves the story's central point (armature). You never rewrite or cut anything — you flag and illuminate; the author decides. Return ONLY a JSON array.",

function PlotArc({beats}){
  const W=560, H=150, pad=28;
  if(!beats || beats.length<2){
    return <div className="arc-wrap"><div className="arc-head"><span className="t">Plot journey</span><span className="mono">tension over time</span></div>
      <div className="arc-empty">The arc draws itself as you answer the guided questions.</div></div>;
  }
  const n = beats.length;
  const xs = beats.map((b,i)=> pad + (i*(W-2*pad))/(n-1));
  const ys = beats.map(b=> (H-pad) - (Math.max(0,Math.min(100,b.tension))/100)*(H-2*pad));
  // smooth path
  let d = `M ${xs[0]} ${ys[0]}`;
  for(let i=1;i<n;i++){
    const cx = (xs[i-1]+xs[i])/2;
    d += ` C ${cx} ${ys[i-1]}, ${cx} ${ys[i]}, ${xs[i]} ${ys[i]}`;
  }
  return (
    <div className="arc-wrap">
      <div className="arc-head"><span className="t">Plot journey</span><span className="mono">tension over time</span></div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{overflow:"visible"}}>
        <line x1={pad} y1={H-pad} x2={W-pad} y2={H-pad} stroke="var(--line)" />
        <path d={d} fill="none" stroke="var(--indigo)" strokeWidth="2.2" />
        {beats.map((b,i)=>(
          <g key={i}>
            <circle cx={xs[i]} cy={ys[i]} r="4" fill="var(--indigo)" />
            <text x={xs[i]} y={H-pad+16} fontSize="9" fontFamily="IBM Plex Mono" fill="var(--muted)" textAnchor="middle">
              {b.label.length>14?b.label.slice(0,13)+"…":b.label}
            </text>
          </g>
        ))}
      </svg>
    </div>
  );
}

const TIERS=[
  ["main","Main","Drives the plot and changes by the end — the story is about them. Give these the full card: want, need, flaw, arc, voice."],
  ["supporting","Supporting","Recurring and important to the plot, but the story isn't about their change. They shape the main characters' journey."],
  ["ancillary","Ancillary","Named but minor — appears once or twice, serves a scene or a fact. A line of notes is usually enough."]
];
const tierOf=(c)=>["main","supporting","ancillary"].includes(c.tier)?c.tier:"supporting";

// compose a copy-paste image prompt locally from the card — no API needed
function composeImagePrompt(c, project){
  const bits=[
    `Character portrait: ${c.name}${c.role?`, ${c.role}`:""} from a ${project.genre||typeLabel(project.type)} story.`,
    c.notes && `Appearance & essence: ${c.notes}`,
    c.voice && `Bearing/personality: ${c.voice}`,
    c.flaw && `There's a hint of their inner wound: ${c.flaw}`,
    (project.world||[]).filter(w=>w.category==="Time & era"||w.category==="Mood & atmosphere").slice(0,2).map(w=>w.detail||w.name).join("; ") && `Setting mood: ${(project.world||[]).filter(w=>w.category==="Time & era"||w.category==="Mood & atmosphere").slice(0,2).map(w=>w.detail||w.name).join("; ")}`,
    `Style: cinematic character portrait, detailed, evocative lighting. No text or watermarks.`
  ].filter(Boolean);
  return bits.join(" ");
}

function CharactersTab({project, upd, ai, openSettings, focusCharId, onFocusConsumed, onJumpToDoc}){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [newName,setNewName]=useState("");
  const [newTier,setNewTier]=useState("supporting");
  const [tierFilter,setTierFilter]=useState("all");
  const [q,setQ]=useState("");
  const [openId,setOpenId]=useState(null);
  const [workingId,setWorkingId]=useState(null);
  const [promptFor,setPromptFor]=useState({});
  const [copied,setCopied]=useState(null);
  const [showTips,setShowTips]=useState(false);

  useEffect(()=>{
    if(focusCharId){
      setOpenId(focusCharId); setTierFilter("all"); setQ("");
      onFocusConsumed && onFocusConsumed();
      setTimeout(()=>{ const el=document.getElementById("char-"+focusCharId); if(el) el.scrollIntoView({behavior:"smooth",block:"center"}); }, 60);
    }
  }, [focusCharId]);

  const chars=project.characters||[];
  const edit=(id,patch)=>upd({characters:chars.map(c=>c.id===id?{...c,...patch}:c)});
  const del=(id)=>upd({characters:chars.filter(c=>c.id!==id)});
  const add=()=>{ if(!newName.trim())return; const c={id:uid(),name:newName.trim(),role:"",notes:"",tier:newTier,source:"manual"}; upd({characters:[...chars,c]}); setNewName(""); setOpenId(c.id); };

  const counts={all:chars.length, main:0, supporting:0, ancillary:0};
  chars.forEach(c=>counts[tierOf(c)]++);
  const filtered=chars.filter(c=>(tierFilter==="all"||tierOf(c)===tierFilter) && (!q.trim()||c.name.toLowerCase().includes(q.toLowerCase())||(c.role||"").toLowerCase().includes(q.toLowerCase())));

  const allProse = ()=>[...(project.sections||[]),...(project.scenes||[])].map(s=>s.content||"").join("\n");
  const proseAbout=(name)=>{
    const paras=allProse().split(/\n\n+/).filter(p=>p.toLowerCase().includes(name.toLowerCase()));
    return paras.join("\n\n").slice(0,7000);
  };
  // which chapters/scenes mention this character (for the "Appears in" list)
  const appearsIn=(name)=>{
    if(!name||!name.trim()) return [];
    const n=name.toLowerCase();
    const hits=[];
    (project.sections||[]).forEach(s=>{ if((s.content||"").toLowerCase().includes(n)) hits.push({kind:"chapters",id:s.id,title:s.title}); });
    (project.scenes||[]).forEach(s=>{ if((s.content||"").toLowerCase().includes(n)) hits.push({kind:"scenes",id:s.id,title:"Scene: "+s.title}); });
    return hits;
  };
  const onPortraitFile=(id,file)=>{
    if(!file) return;
    if(file.size > 900000){ setErr("That image is a bit large to store in-browser — try one under ~900KB, or paste an image URL instead."); return; }
    const r=new FileReader();
    r.onload=()=>edit(id,{image:r.result});
    r.readAsDataURL(file);
  };

  async function rescan(){
    if(!ai.ready){ openSettings(); return; }
    setErr(""); setBusy(true);
    const text = [
      project.overview, project.outlineOpen, project.firstLine,
      ...project.qa.map(x=>x.a),
      ...project.chapters.map(c=>c.title+" "+c.summary),
      ...project.sections.map(s=>s.content),
      ...(project.scenes||[]).map(s=>s.content)
    ].join("\n").slice(0,9000);
    try{
      const out = await ai.run({
        maxTokens:1100,
        system:"You extract characters/people. Return ONLY a JSON array.",
        prompt:`Extract named characters/people from this ${typeLabel(project.type)}. Each: {"name","role","tier","description"} where tier is "main" | "supporting" | "ancillary" by importance. Return [] if none.\n\n"""${text}"""`
      });
      const found=parseJSON(out);
      if(Array.isArray(found)) upd({characters: mergeChars(chars, found, "outline")});
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setBusy(false);
  }

  async function suggestDepth(c){
    if(!ai.ready){ openSettings(); return; }
    setErr(""); setWorkingId(c.id);
    const ctx=[
      project.armature&&`The story's point: ${project.armature}`,
      c.role&&`Role: ${c.role}`, c.notes&&`Notes: ${c.notes}`,
      `Material about them:\n${proseAbout(c.name)||"(little written yet — infer gently from role and story)"}`,
      `Story premise: ${project.premise||"—"}`
    ].filter(Boolean).join("\n");
    try{
      const out=await ai.run({
        maxTokens:800,
        system:"You suggest character-development notes an author will edit. Suggestions only — never prose from the story. Return ONLY a JSON object.",
        prompt:`For ${c.name} in the ${typeLabel(project.type)} "${project.title}", suggest (1-2 sentences each, as editable planning notes): {"want":"surface goal they pursue","need":"the deeper lesson the story teaches them","flaw":"the flaw or wound holding them back","arc":"how they change from first page to last","voice":"how they speak and see the world — diction, tics, worldview"}.\n\n${ctx}`
      });
      const j=parseJSON(out);
      const patch={};
      ["want","need","flaw","arc","voice"].forEach(k=>{ if(j[k] && !(c[k]&&c[k].trim())) patch[k]=j[k]; });
      if(Object.keys(patch).length) edit(c.id,patch);
      else setErr("All depth fields already have your words — nothing overwritten.");
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setWorkingId(null);
  }

  async function voiceScore(c){
    if(!ai.ready){ openSettings(); return; }
    const sample=proseAbout(c.name);

    setErr(""); setWorkingId(c.id);
    try{
      const out=await ai.run({
        maxTokens:900,
        system:"You are a voice analyst. You score how strong a character's voice is in the author's OWN prose. You quote at most a few short phrases as evidence and never rewrite anything. Return ONLY a JSON object.",
        prompt:`Character: ${c.name}${c.role?` (${c.role})`:""}.${c.voice?` The author's intent for their voice: ${c.voice}`:""}\n\nScore their voice in these passages on four axes, each 0-100:\n- distinctiveness: with the name removed, could a reader tell it's them?\n- consistency: does the voice hold steady across appearances?\n- subtext: do they speak around what they mean, or announce it flatly?\n- specificity: concrete, particular diction vs generic phrasing?\nReturn {"distinctiveness":n,"consistency":n,"subtext":n,"specificity":n,"overall":n,"summary":"2 sentences on what's working and the one thing to push","evidence":["up to 3 short quoted phrases from the text that show the voice"]}.\n\n"""${sample}"""`
      });
      const j=parseJSON(out);
      edit(c.id,{voiceScore:j});
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setWorkingId(null);
  }

  const copyPrompt=(id,text)=>{
    try{ navigator.clipboard.writeText(text); setCopied(id); setTimeout(()=>setCopied(null),1500); }catch(e){}
  };

  return (
    <div>
      <div className="section-head">
        <div><h2>Characters</h2><div className="sub">Auto-populated from your outline and writing. Every field below is a writing prompt — a character exists to struggle and change.</div></div>
        <button className="btn btn-sm" disabled={busy} onClick={rescan}>
          {busy? <><span className="spin dark"></span> Scanning…</> : <>{iSpark} Scan outline &amp; writing</>}
        </button>
      </div>
      {err && <div className="err" style={{marginBottom:12}}>{err}</div>}

      <div className="howbox" style={{marginBottom:16}}>
        <button className="how-toggle" onClick={()=>setShowTips(v=>!v)}>
          <span>Character craft tips {showTips?"▲":"▼"}</span>
          <span className="mono">what makes a character work</span>
        </button>
        {showTips && (
          <div className="how-body">
            <div className="how-steps" style={{gridTemplateColumns:"1fr 1fr"}}>
              {[
                ["Want ≠ Need","Give them a goal they're chasing AND a deeper truth they actually need. The gap between the two is often the whole story."],
                ["Struggle is the measure","Apply real pressure — back a main character into a corner, emotionally or physically. A character is measured by the size of what they overcome."],
                ["Let dialogue mean more than it says","People rarely state exactly what they feel. What's unsaid — the subtext — is where the charge lives."],
                ["One job for supporting cast","A supporting character doesn't need a full arc — just a clear function: to sharpen, challenge, or reveal your main characters."],
                ["The flaw causes the bad decision","A flaw isn't a quirky trait — it should be the reason they make their worst choice. That's what makes an arc earn its ending."],

                      <span className="crow-role">{c.role||"—"}</span>

                          <div style={{flex:1,minWidth:180}}>
                            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>

                              <select className="world-select" value={t} onChange={e=>edit(c.id,{tier:e.target.value})}>

                              <span className={"tag "+(c.source==="manual"?"manual":c.source==="writing"?"writing":"outline")}>{c.source||"manual"}</span>

                                {apps.map((a,i)=><button key={i} className="appears-link" onClick={()=>onJumpToDoc&&onJumpToDoc(a.kind,a.id)}>{a.title}</button>)}
                              </div>

                          </div>
                        </div>
                        <div className="cfields">
                          <div className="cfield" style={{gridColumn:"1 / -1"}}>
                            <label>Role & who they are</label>
                            <input className="ci" style={{fontFamily:"Inter",fontSize:13,fontWeight:400,marginBottom:6}} value={c.role||""} onChange={e=>edit(c.id,{role:e.target.value})} placeholder="protagonist / mentor / rival…" />
                            <textarea value={c.notes||""} onChange={e=>edit(c.id,{notes:e.target.value})} placeholder="Appearance, essence, history — the portrait." />
                          </div>
                          <div className="cfield"><label>Want</label><div className="sub2">the surface goal they chase</div>
                            <textarea value={c.want||""} onChange={e=>edit(c.id,{want:e.target.value})} /></div>
                          <div className="cfield"><label>Need</label><div className="sub2">the deeper lesson the story teaches them</div>
                            <textarea value={c.need||""} onChange={e=>edit(c.id,{need:e.target.value})} /></div>
                          <div className="cfield"><label>Flaw / wound</label><div className="sub2">what holds them back — pressure goes here</div>
                            <textarea value={c.flaw||""} onChange={e=>edit(c.id,{flaw:e.target.value})} /></div>
                          <div className="cfield"><label>Arc</label><div className="sub2">how they change, first page to last</div>
                            <textarea value={c.arc||""} onChange={e=>edit(c.id,{arc:e.target.value})} /></div>
                          <div className="cfield"><label>Voice</label><div className="sub2">diction, tics, worldview — how they sound</div>
                            <textarea value={c.voice||""} onChange={e=>edit(c.id,{voice:e.target.value})} /></div>
                          <div className="cfield"><label>Relationships</label><div className="sub2">who they love, fear, owe</div>
                            <textarea value={c.relationships||""} onChange={e=>edit(c.id,{relationships:e.target.value})} /></div>
                        </div>
                        <div className="toolbar">
                          <button className="btn btn-sm" disabled={workingId===c.id} onClick={()=>suggestDepth(c)}>
                            {workingId===c.id? <><span className="spin dark"></span> Thinking…</> : <>{iSpark} Suggest depth (fills only empty fields)</>}
                          </button>
                          <button className="btn btn-sm" disabled={workingId===c.id} onClick={()=>voiceScore(c)}>
                            {workingId===c.id? <><span className="spin dark"></span> Reading…</> : <>{iSpark} Voice strength</>}
                          </button>
                          <button className="btn btn-sm" onClick={()=>setPromptFor(p=>({...p,[c.id]: p[c.id]? undefined : composeImagePrompt(c, project)}))}>
                            {promptFor[c.id]?"Hide image prompt":"Image prompt"}
                          </button>
                        </div>
                        {vs && (
                          <div className="card" style={{marginTop:12,background:"var(--sage-soft)",borderColor:"#D7E0E4"}}>
                            <div className="mono" style={{marginBottom:8}}>Voice strength · {vs.overall}/100 <span style={{textTransform:"none",fontStyle:"italic"}}>— measured from your actual pages</span></div>
                            {[["Distinctiveness","distinctiveness"],["Consistency","consistency"],["Subtext","subtext"],["Specificity","specificity"]].map(([l,k])=>(
                              <div className="factor-row" key={k}>
                                <span style={{minWidth:110}}>{l}</span>
                                <div className="factor-bar"><i style={{width:(vs[k]||0)+"%"}}></i></div>
                                <span className="mono" style={{minWidth:28,textAlign:"right"}}>{vs[k]||0}</span>
                              </div>
                            ))}
                            {vs.summary && <div className="reading" style={{fontSize:13.5,color:"#2C4A5A",marginTop:8}}>{vs.summary}</div>}
                            {Array.isArray(vs.evidence)&&vs.evidence.length>0 && <div style={{fontSize:12,color:"var(--muted)",marginTop:6,fontStyle:"italic"}}>Heard in: {vs.evidence.map((e,i)=><span key={i}>“{e}”{i<vs.evidence.length-1?" · ":""}</span>)}</div>}
                          </div>
                        )}
                        {promptFor[c.id] && (
                          <div className="copybox">
                            <div className="mono" style={{marginBottom:4}}>Image prompt — paste into Nano Banana, Midjourney, or any image tool</div>
                            <textarea value={promptFor[c.id]} onChange={e=>setPromptFor(p=>({...p,[c.id]:e.target.value}))} />
                            <button className="btn btn-sm" style={{marginTop:6}} onClick={()=>copyPrompt(c.id, promptFor[c.id])}>{copied===c.id?"Copied ✓":"Copy prompt"}</button>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
        </div>
      </div>
    </div>
  );
}

/* ---------------- WORLD TAB ---------------- */
// count word-boundary mentions of a name in the manuscript
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"); }
function mentionCount(name, prose){
  if(!name || name.trim().length<2) return 0;
  try{ const re=new RegExp("(^|[^A-Za-z0-9'])"+escRe(name.trim())+"($|[^A-Za-z0-9'])","gi");
    return (prose.match(re)||[]).length;
  }catch(e){ return 0; }
}
// heuristic cohesion per category: breadth (how many elements) + depth (how described)
function worldCohesion(world){
  return WORLD_CATEGORIES.map(cat=>{
    const items=(world||[]).filter(w=>w.category===cat);
    if(!items.length) return {cat, score:0, n:0};
    const breadth=Math.min(1, items.length/4);
    const depth=items.reduce((s,w)=>s+Math.min(1,(w.detail||"").length/80),0)/items.length;
    return {cat, score:Math.round((breadth*0.55 + depth*0.45)*100), n:items.length};
  });
}
function composeWorldImagePrompt(w, project){
  const era=(project.world||[]).filter(x=>x.category==="Time & era").slice(0,1).map(x=>x.detail||x.name).join("");
  const mood=(project.world||[]).filter(x=>x.category==="Mood & atmosphere").slice(0,2).map(x=>x.detail||x.name).join("; ");
  return [
    `Environment concept art: ${w.name} — a ${w.category.toLowerCase()} element from a ${project.genre||typeLabel(project.type)} story.`,
    w.detail && `Description: ${w.detail}`,
    era && `Era: ${era}`,
    mood && `Mood: ${mood}`,
    `Style: cinematic wide establishing shot, richly detailed, atmospheric lighting. No text or watermarks.`
  ].filter(Boolean).join(" ");
}

function mergeWorld(existing, found, source){
  const out=[...existing];
  found.forEach(f=>{
    if(!f || !f.name) return;
    const cat = WORLD_CATEGORIES.includes(f.category) ? f.category : "Other";
    const hit = out.find(w=>w.name.toLowerCase().trim()===f.name.toLowerCase().trim() && w.category===cat);
    if(hit){ if((!hit.detail||hit.detail.length<10)&&f.detail) hit.detail=f.detail; }
    else out.push({id:uid(), category:cat, name:f.name, detail:f.detail||"", source});
  });
  return out;
}

function WorldTab({project, upd, ai, openSettings, onJumpToDoc, logReview}){
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState("");
  const [status,setStatus]=useState("");
  const [pasteOpen,setPasteOpen]=useState(false);
  const [pasteText,setPasteText]=useState("");
  const [newName,setNewName]=useState("");
  const [newCat,setNewCat]=useState(WORLD_CATEGORIES[0]);
  const [catFilter,setCatFilter]=useState("all");
  const [q,setQ]=useState("");
  const [openId,setOpenId]=useState(null);
  const [showTips,setShowTips]=useState(false);
  const [gaps,setGaps]=useState(null);
  const [gapBusy,setGapBusy]=useState(false);
  const [promptFor,setPromptFor]=useState({});
  const [copied,setCopied]=useState(null);
  const fileRef = useRef(null);
  const world = project.world;

  const edit=(id,patch)=>upd({world:world.map(w=>w.id===id?{...w,...patch}:w)});
  const del=(id)=>upd({world:world.filter(w=>w.id!==id)});
  const add=()=>{ if(!newName.trim())return; const w={id:uid(),category:newCat,name:newName.trim(),detail:"",source:"manual"}; upd({world:[...world,w]}); setNewName(""); setOpenId(w.id); };

  const prose=[...(project.sections||[]),...(project.scenes||[])].map(s=>s.content||"").join("\n");
  const mentions={}; world.forEach(w=>{ mentions[w.id]=mentionCount(w.name, prose); });
  const appearsIn=(name)=>{
    if(!name||name.trim().length<2) return [];
    const hits=[];
    (project.sections||[]).forEach(s=>{ if(mentionCount(name, s.content||"")>0) hits.push({kind:"chapters",id:s.id,title:s.title}); });
    (project.scenes||[]).forEach(s=>{ if(mentionCount(name, s.content||"")>0) hits.push({kind:"scenes",id:s.id,title:"Scene: "+s.title}); });
    return hits;
  };
  const onPortraitFile=(id,file)=>{
    if(!file) return;
    if(file.size > 900000){ setErr("That image is a bit large to store in-browser — try one under ~900KB, or paste an image URL instead."); return; }
    const r=new FileReader(); r.onload=()=>edit(id,{image:r.result}); r.readAsDataURL(file);
  };
  const copyPrompt=(id,text)=>{ try{ navigator.clipboard.writeText(text); setCopied(id); setTimeout(()=>setCopied(null),1500);}catch(e){} };

  const cohesion=worldCohesion(world);
  const counts={all:world.length}; WORLD_CATEGORIES.forEach(c=>counts[c]=world.filter(w=>w.category===c).length);
  const filtered=world.filter(w=>(catFilter==="all"||w.category===catFilter) && (!q.trim()||w.name.toLowerCase().includes(q.toLowerCase())||(w.detail||"").toLowerCase().includes(q.toLowerCase())));

  async function findGaps(){
    if(!ai.ready){ openSettings(); return; }
    setErr(""); setGapBusy(true); setGaps(null);
    const inv=WORLD_CATEGORIES.map(cat=>{
      const items=world.filter(w=>w.category===cat);
      return `${cat} (${items.length}): ${items.map(w=>w.name+(w.detail?" — "+w.detail.slice(0,80):"")).join("; ")||"(empty)"}`;
    }).join("\n");
    try{
      const out=await ai.run({
        maxTokens:1200,
        system:"You find world-building gaps and turn them into questions for the author. You never invent world facts — you only ask what's missing. Return ONLY a JSON array.",
        prompt:`This ${typeLabel(project.type)}${project.genre?` (${project.genre})`:""} titled "${project.title}"${project.armature?` is about: ${project.armature}.`:"."}\n\nWorld inventory by category:\n${inv}\n\nIdentify the 3-6 most valuable gaps or thin spots — places where deepening the world would serve THIS story and its point. For each: {"category","gap":"what's thin and why it matters here","prompt":"one concrete question for the author to answer in their own words","severity":"high|medium|low"}. Prioritize gaps that touch the plot or the armature.`
      });
      const arr=parseJSON(out); setGaps(Array.isArray(arr)?arr:[]);
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setGapBusy(false);
  }

  async function extract({text, pdf, source}){
    if(!ai.ready){ openSettings(); return; }
    setErr(""); setBusy(true);
    const instruction = `Extract world-building elements from this ${typeLabel(project.type)}${project.type&&["memoir","biography","journal","essay","howto","other"].includes(project.type)?" (for nonfiction, 'world' means the real setting, era, community, and context)":""}. For each element return {"category","name","detail"} where category is EXACTLY one of: ${WORLD_CATEGORIES.join(", ")}. "name" is the element (a place, an era, a rule, a custom, a mood), "detail" is one short line. Return ONLY a JSON array. Return [] if none.`;
    try{
      let out;
      if(pdf){
        out = await ai.run({ maxTokens:1400, documents:[pdf],
          system:"You extract structured world-building data. Return ONLY a JSON array.",
          prompt: instruction + "\n\nThe document is attached." });
      } else {
        out = await ai.run({ maxTokens:1400,
          system:"You extract structured world-building data. Return ONLY a JSON array.",
          prompt: instruction + `\n\n"""${(text||"").slice(0,9000)}"""` });
      }
      const found = parseJSON(out);
      if(Array.isArray(found) && found.length){
        upd({world: mergeWorld(world, found, source)});
        setStatus(`Added ${found.length} element${found.length>1?"s":""} to your world.`);
      } else setStatus("No world details found in that.");
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setBusy(false);
  }

  async function onFile(e){
    const file = e.target.files[0]; if(!file) return;
    if(!ai.ready){ openSettings(); if(fileRef.current) fileRef.current.value=""; return; }
    setErr(""); setStatus(`Reading ${file.name}…`); setBusy(true);
    try{
      const r = await readUpload(file);
      setStatus(`Understanding ${file.name}…`);
      await extract({...r, source:"upload"});
    }catch(e){ setErr(e.message); setBusy(false); }
    if(fileRef.current) fileRef.current.value="";
  }

  async function scan(){
    const text = [
      project.overview, project.outlineOpen, project.firstLine,
      ...project.qa.map(x=>x.a),
      ...project.chapters.map(c=>c.title+" "+c.summary),
      ...project.sections.map(s=>s.content),
      ...(project.scenes||[]).map(s=>s.content)
    ].join("\n");
    if(text.trim().length<20){ setErr("There's not much in your outline or writing to scan yet."); return; }
    await extract({text, source:"outline"});
  }

  return (
    <div>
      <div className="section-head">
        <div><h2>World</h2><div className="sub">The place, the era, the rules, the mood — as vital as your cast. Mention counts show what's load-bearing in your actual prose.</div></div>
        <button className="btn btn-sm" disabled={busy} onClick={scan}>
          {busy? <><span className="spin dark"></span> Working…</> : <>{iSpark} Scan outline &amp; writing</>}
        </button>
      </div>

      <div className="howbox" style={{marginBottom:16}}>
        <button className="how-toggle" onClick={()=>setShowTips(v=>!v)}>
          <span>World craft tips {showTips?"▲":"▼"}</span>
          <span className="mono">a world that serves the story</span>
        </button>
        {showTips && (
          <div className="how-body">
            <div className="how-steps" style={{gridTemplateColumns:"1fr 1fr"}}>
              {[
                ["Establish the rules early","Tell the reader what's possible in your world before it matters. A rule revealed only when it saves the hero feels like cheating."],
                ["Rules need costs","Magic, technology, power — whatever bends reality should cost something. Limits create tension; omnipotence kills it."],
                ["The world presses on the plot","Your best world details are the ones characters collide with. If removing an element changes nothing, it's decoration."],
                ["Mentions are the measure","An element described once and never touched again isn't world-building — it's inventory. The counts below show what's actually alive on your pages."],
                ["Nonfiction has a world too","In memoir or devotional, 'world' is the era, the community, the kitchen table. Grounding readers in the real place earns their trust."],
                ["Reveal, don't recite","Deliver the world through action and consequence, not paragraphs of explanation. If a character can experience it, don't have a narrator announce it."]
              ].map((t,i)=>(
                <div className="how-step" key={i}>
                  <span className="hs-n">{i+1}</span>
                  <div><b>{t[0]}</b><div className="hs-p">{t[1]}</div></div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      <div className="upload-row">
        <div className="ur-head">Already have world notes?</div>
        <div className="ur-sub">Upload a document and I'll pull the world out of it — or paste text. Supports .txt, .md, .docx, .pdf.</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <label className="file-btn">
            {busy? "Working…" : "Choose a file"}
            <input ref={fileRef} type="file" accept=".txt,.md,.markdown,.docx,.pdf" style={{display:"none"}} onChange={onFile} disabled={busy} />
          </label>
          <button className="btn btn-sm btn-ghost" onClick={()=>setPasteOpen(v=>!v)}>{pasteOpen?"Hide paste box":"…or paste text"}</button>
        </div>
        {pasteOpen && (
          <div style={{marginTop:12}}>
            <textarea className="write-area small" value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="Paste any world description here." />
            <div className="toolbar">
              <button className="btn btn-primary btn-sm" disabled={busy||!pasteText.trim()} onClick={()=>extract({text:pasteText, source:"upload"})}>{iSpark} Build world from this</button>
            </div>
          </div>
        )}
        {status && <div className="mono" style={{marginTop:10,color:"var(--sage)"}}>{status}</div>}
        {err && <div className="err">{err}</div>}
      </div>

      <div className="char-layout">
        <aside className="tier-nav">
          <button className={"tier-btn"+(catFilter==="all"?" on":"")} onClick={()=>setCatFilter("all")}><span>All</span><span className="cnt">{counts.all}</span></button>
          {WORLD_CATEGORIES.map(c=>(
            <button key={c} className={"tier-btn"+(catFilter===c?" on":"")} onClick={()=>setCatFilter(c)}><span>{c}</span><span className="cnt">{counts[c]}</span></button>
          ))}
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Filter…" style={{border:"1px solid var(--line)",borderRadius:8,padding:"7px 10px",fontSize:13,marginTop:6}} />
          <div style={{marginTop:8}}>
            <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="New element…" onKeyDown={e=>e.key==="Enter"&&add()} style={{width:"100%",border:"1px solid var(--line)",borderRadius:8,padding:"7px 10px",fontSize:13,marginBottom:6}} />
            <div style={{display:"flex",gap:6}}>
              <select className="world-select" style={{flex:1,minWidth:0}} value={newCat} onChange={e=>setNewCat(e.target.value)}>
                {WORLD_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
              <button className="btn btn-primary btn-sm" onClick={add}>Add</button>
            </div>
          </div>
        </aside>

        <div>
          <div className="card" style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap",marginBottom:8}}>
              <span className="mono">How built is your world?</span>
              <button className="btn btn-sm" disabled={gapBusy} onClick={findGaps}>
                {gapBusy? <><span className="spin dark"></span> Looking…</> : <>{iSpark} Find my gaps</>}

// one rotating tip — never a list — tuned to the form being written
function RollingTip({type}){
  const cat = type==="poetry" ? "poetry" : (type==="play"||type==="screenplay") ? "drama" : "prose";
  const tips = useMemo(()=>[...TIP_BANK.universal, ...TIP_BANK[cat]], [cat]);
  const [i,setI]=useState(()=>Math.floor(Math.random()*tips.length));
  useEffect(()=>{ const t=setInterval(()=>setI(x=>(x+1)%tips.length), 24000); return ()=>clearInterval(t); },[tips.length]);
  return (
    <div className="rolltip" key={i}>
      <span className="rt-star">✦</span>
      <span style={{flex:1}}>{tips[i%tips.length]}</span>
      <button className="slot-mini" title="Another tip" onClick={()=>setI(x=>(x+1)%tips.length)}>↻</button>
    </div>
  );
}
