// Read-only preview that turns the FIRST mention of each character name into a jump link.
function LinkedProse({text, characters, onJumpToChar}){
  const names=(characters||[]).map(c=>({id:c.id,name:(c.name||"").trim()})).filter(c=>c.name.length>1)
    .sort((a,b)=>b.name.length-a.name.length); // longest first so "Lemus' Father" wins over "Lemus"
  const linked={};
  const nodes=[];
  const src=text||"";
  let i=0, key=0;
  const lower=src.toLowerCase();
  while(i<src.length){
    let matched=null;
    for(const c of names){
      if(linked[c.id]) continue;
      const at=lower.indexOf(c.name.toLowerCase(), i);
      if(at===i){
        const before=i===0?"":src[i-1];
        const after=src[i+c.name.length]||"";
        const wb=(ch)=>!/[a-zA-Z0-9']/.test(ch);
        if(wb(before)&&wb(after)){ matched=c; break; }
      }
    }
    if(matched){
      linked[matched.id]=true;
      nodes.push(<span key={key++} className="prose-link" onClick={()=>onJumpToChar&&onJumpToChar(matched.id)}>{src.substr(i,matched.name.length)}</span>);
      i+=matched.name.length;
    } else {
      let j=i+1; while(j<src.length){ const nb=/[a-zA-Z0-9']/.test(src[j-1]); if(!nb) break; j++; }
      nodes.push(src.substring(i, j)); i=j;
    }
  }
  return <div className="prose-preview">{nodes}</div>;
}

function WritingTab({project, upd, ai, openSettings, focusDoc, onFocusConsumed, onJumpToChar, logReview}){

  }, [totalWords]);
  useEffect(()=>{ if(celeb){ const t=setTimeout(()=>setCeleb(null), 8000); return ()=>clearTimeout(t); } }, [celeb]);

  const todayWritten=(project.wordLog||{})[todayKey()]||0;

  const addScene = ()=>{ const s={id:uid(),title:`Scene ${scenes.length+1}`,content:"",beat:"",chapterId:""}; upd({scenes:[...scenes,s]}); setActiveScene(s.id); };
  const editScene = (id,patch)=>upd({scenes:scenes.map(s=>s.id===id?{...s,...patch}:s)});
  const delScene = (id)=>{ const rest=scenes.filter(s=>s.id!==id); upd({scenes:rest}); if(activeScene===id) setActiveScene(rest[0]?.id||null); };

  const addSection = ()=>{

    upd({sections:[...sections, s]}); setActive(s.id);

    if(!ai.ready){ openSettings(); return; }
    if(!current || !current.content.trim()){ setErr("Nothing to summarize yet."); return; }
    setErr(""); setBusy(true);

      const out = await ai.run({
        maxTokens:400,
        system:"You write tight chapter recaps for an author's reference. 2-3 sentences, plain.",
        prompt:`Summarize this ${unitName(project.type).toLowerCase()} of a ${typeLabel(project.type)} in 2-3 sentences:\n\n"""${current.content.slice(0,7000)}"""`
      });

    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setBusy(false);
  }

  const scopedText = ()=> edScope==="whole"
    ? sections.map(x=>`### ${x.title}\n${x.content||""}`).join("\n\n")
    : (activeDoc?.content||"");

  // Fit the draft into a character budget WITHOUT dropping whole chapters.
  // In whole-draft mode, if it's too long, take a proportional slice from EACH
  // chapter so every chapter is represented, and tell the caller it was sampled.
  function scopedForAI(budget){
    if(edScope!=="whole"){
      const t=activeDoc?.content||"";
      return {text:t.slice(0,budget), truncated:t.length>budget, sampled:false, chapterCount:1};
    }
    const drafted = sections.filter(x=>(x.content||"").trim());
    const full = drafted.map(x=>`### ${x.title}\n${x.content||""}`).join("\n\n");
    if(full.length<=budget) return {text:full, truncated:false, sampled:false, chapterCount:drafted.length};
    // too long: give each chapter a fair share of the budget
    const per = Math.floor((budget - drafted.length*40) / Math.max(1,drafted.length));
    const parts = drafted.map(x=>{
      const body=(x.content||"");
      const take = body.length<=per ? body : body.slice(0,per)+" […section continues…]";
      return `### ${x.title}\n${take}`;
    });
    return {text:parts.join("\n\n"), truncated:true, sampled:true, chapterCount:drafted.length};
  }

  async function getFeedback(){
    if(!ai.ready){ openSettings(); return; }

    if(!S.text.trim()){ setErr("Write something first."); return; }
    if(project.editorFocus.length===0){ setErr("Pick at least one focus for the editor."); return; }
    setErr(""); setEdBusy(true);
    const focusLabels = project.editorFocus.map(id=>FOCUS_OPTIONS.find(f=>f.id===id)?.t).join(", ");
    const typeGuidance = {
      screenplay:"Judge it as a screenplay: scene economy, visual storytelling, format, and whether it plays on screen.",
      play:"Judge it as a stage play: dialogue that performs, subtext, and stagecraft.",
      poetry:"Judge it as poetry: imagery, sound, line breaks, compression, and where a word earns its place.",
      memoir:"Judge it as memoir: emotional truth, voice, reflection vs. narration, and what the reader takes away.",
      biography:"Judge it as biography: accuracy of framing, narrative momentum, and fair treatment of the subject.",
      journal:"Judge it as a devotional/journal entry: sincerity, resonance, and usefulness to the reader.",
      howto:"Judge it as instructional nonfiction: clarity, logical steps, and whether a reader could act on it.",
      essay:"Judge it as an essay: argument, structure, and the strength of the through-line.",
      novel:"Judge it as literary/commercial prose fiction.",
      vignettes:"Judge it as a short piece: compression, a single strong effect, and a satisfying turn."
    }[project.type] || "Judge it on its own terms for its form.";
    try{
      const armLens = project.editorFocus.includes("armature") ? `\n- ARMATURE: The story's point is: "${project.armature||"(not yet defined)"}". Assess whether this ${unitName(project.type).toLowerCase()} actually serves that point, or drifts from it.` : "";
      const readerLens = project.editorFocus.includes("reader") ? `\n- READER EXPECTATIONS: Read it against what a ${project.genre||typeLabel(project.type)} reader expects — where it delivers and where it may lose them.` : "";
      const out = await ai.run({
        maxTokens:1700,
        system:`You are a sharp, warm developmental editor for a ${typeLabel(project.type)}${project.genre?` in the ${project.genre} genre`:""}. ${typeGuidance} You SUGGEST and QUESTION — you never rewrite the author's prose or hand them replacement lines. Point to actual lines by quoting a few words. Be honest but encouraging; the author must stay motivated to finish. Return ONLY a JSON object.`,
        prompt:`Give editorial notes on ${edScope==="whole"?"this full draft (all "+S.chapterCount+" "+unitName(project.type).toLowerCase()+"s, stitched in order)":"this "+unitName(project.type).toLowerCase()}. Focus ONLY on: ${focusLabels}.${armLens}${readerLens}\n\nReturn: {"strengths":"2-3 genuine strengths to keep, as one warm paragraph","notes":[{"focus":"which focus area","note":"short title of the issue","detail":"what to consider — quote a few words from the text; never rewrite for them","severity":"high|medium|low"}],"oneThing":"the single most valuable revision to make next, one sentence"}\nKeep notes to the 3-7 most valuable${edScope==="whole"?", drawn from across the whole draft — not only the opening "+unitName(project.type).toLowerCase():""}.\n\n"""${S.text}"""${S.sampled?"\n(Long draft: the above is a proportional sample from every "+unitName(project.type).toLowerCase()+" — weight structural notes across the whole arc and say so where relevant.)":""}`
      });

      }

    setErr(""); setSeatBusy(true); setSeatOut(null); setSentDoors([]);
    const scopeDesc = edScope==="whole"
      ? `this full draft — all ${S.chapterCount} ${unitName(project.type).toLowerCase()}${S.chapterCount===1?"":"s"}, stitched in order${S.sampled?" (long draft: you're seeing a proportional sample from every "+unitName(project.type).toLowerCase()+", so weight your read across the whole arc, not just the opening)":""}`
      : `this ${unitName(project.type).toLowerCase()}`;
    try{
      const out=await ai.run({
        maxTokens:1300,
        system:`You are a devoted ${project.genre||typeLabel(project.type)} reader describing your honest reading EXPERIENCE — not an editor giving fixes. Rules: describe what you felt and where; never tell the author to conform to convention; treat distinctiveness as an asset; frame every opportunity as a door opening ("what if you leaned further into…"), never a correction. Curiosity and unanswered questions are GOOD — they mean the reader is leaning in. When you name a moment, say which ${unitName(project.type).toLowerCase()} it's in so the author can find it. Quote at most a few short phrases. Return ONLY a JSON object.`,
        prompt:`Read ${scopeDesc} as a ${project.genre||typeLabel(project.type)} reader.${project.armature?` The author says it's really about: "${project.armature}".`:""}\n\nReturn {"pulling":[{"moment":"where you leaned in — name the ${unitName(project.type).toLowerCase()}","why":"what it did to you as a reader"}],"questions":["questions you're carrying as a reader — signs of engagement, not problems"],"doors":[{"spark":"an opportunity to lean further into what's distinctive here","why":"why a reader would follow"}],"connection":"1-2 sentences: where this story and its reader are meeting most strongly right now"}.\nKeep each list to the 2-4 most alive items${edScope==="whole"?", drawn from across the whole draft — not only the first "+unitName(project.type).toLowerCase():""}.\n\n"""${S.text}"""`
      });
      const j=parseJSON(out);
      if(j&&(j.pulling||j.doors)) setSeatOut(j); else setErr("The reader mumbled — try again.");
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setSeatBusy(false);
  }

  async function inspireMe(){
    if(!ai.ready){ openSettings(); return; }
    setErr(""); setInspBusy(true); setInspire("");
    const tail = (activeDoc?.content||"").slice(-1200);
    const where = activeDoc ? `They are currently in ${kind==="scenes"?"a scene called":""} "${activeDoc.title}".` : "They haven't started a section yet.";
    const cast = (project.characters||[]).slice(0,8).map(c=>c.name).join(", ");
    const nextChapters = (project.chapters||[]).slice(0,6).map(c=>c.title).join(" · ");
    try{
      const out = await ai.run({
        maxTokens:600,
        system:"You are an encouraging writing coach. You NEVER write the story or supply prose the author could paste in. You spark momentum with a question, a 'what if', a tension to lean into, or an angle to consider — always leaving the actual writing to the author. Warm, brief, energizing. 3-4 sentences max.",
        prompt:`A ${typeLabel(project.type)}${project.genre?` (${project.genre})`:""} titled "${project.title}".\nWhat it's about (armature): ${project.armature||"(not yet defined)"}\nOutline so far: ${nextChapters||"(none yet)"}\nCast: ${cast||"(none yet)"}\n${where}\nMost recent words they wrote:\n"""${tail||"(nothing yet)"}"""\n\nGive the author a spark to keep going from exactly here — a provocative question, a "what if", or a tension to press on. Do NOT write any of the story for them. End with a gentle push to write the next bit themselves.`
      });
      setInspire(out);
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setInspBusy(false);
  }

  const [keeperBusy,setKeeperBusy]=useState(false);
  const [keeperOut,setKeeperOut]=useState(null);
  async function findKeeper(){
    if(!ai.ready){ openSettings(); return; }
    const text=(activeDoc?.content||"");
    if(text.trim().split(/\s+/).length<120){ setErr("Write a bit more first — the keeper-hunt needs some pages to search."); return; }
    setErr(""); setKeeperBusy(true); setKeeperOut(null);
    try{
      const out=await ai.run({
        maxTokens:500,
        system:"You find the lines in an author's own pages that genuinely sing. Quote their exact words — never improve, never rewrite. Be specific about why each line works; no empty flattery. Return ONLY a JSON object.",
        prompt:`From these pages, choose 1-2 lines that genuinely work — for voice, image, rhythm, subtext, or truth. Return {"lines":[{"quote":"their exact words","why":"one specific sentence on why it sings"}]}.\n\n"""${text.slice(0,7000)}"""`
      });
      const j=parseJSON(out);
      if(j&&Array.isArray(j.lines)&&j.lines.length) setKeeperOut(j.lines);
      else setErr("Couldn't settle on one — keep writing and try again.");
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setKeeperBusy(false);
  }

  async function suggestBeat(){
    if(!ai.ready){ openSettings(); return; }
    if(!curScene || !(curScene.content||"").trim()){ setErr("Write a bit of this scene first, so the editor has something to place."); return; }
    setErr(""); setBeatBusy(true); setBeatSuggest(null);
    const beats = beatsOf(project);
    const beatList = beats.map(b=>`${b.k} = "${b.step}" — ${b.purpose}`).join("\n");
    try{
      const out = await ai.run({
        maxTokens:500,
        system:"You help an author place a scene within their story's structure. You suggest ONE best-fit beat and explain why in a sentence. You never rewrite the scene. Return ONLY a JSON object.",
        prompt:`Story: "${project.title}" (${typeLabel(project.type)}${project.genre?", "+project.genre:""}). Its point (armature): ${project.armature||"(not defined)"}.\n\nThe structural beats available:\n${beatList}\n\nRead this scene and decide which single beat it most naturally serves. Return {"beatKey":"the k value","why":"one sentence on why it fits there"}.\n\nScene "${curScene.title}":\n"""${(curScene.content||"").slice(0,4000)}"""`
      });
      const j=parseJSON(out);
      if(j && j.beatKey && beats.some(b=>b.k===j.beatKey)) setBeatSuggest(j);
      else setErr("Couldn't place this one confidently — you may want to assign it yourself.");
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); }
    setBeatBusy(false);
  }

  const wordCount = current ? (current.content.trim()? current.content.trim().split(/\s+/).length : 0) : 0;

  async function analyzeText(text, quiet){
    if(!ai.ready){ openSettings(); return; }
    if(!text || text.trim().length<40){ setErr("There isn't enough written text here to parse yet."); return; }
    setErr(""); setStatus("Reading your pages…"); setAnBusy(true);
    try{
      const out = await ai.run({
        maxTokens:2200,
        system:"You analyze already-written prose and extract structured story data from it. Return ONLY a JSON object, no prose.",
        prompt:`This is written material from a ${typeLabel(project.type)} titled "${project.title}". Read it and return a JSON object with exactly these keys:\n{"outline":[{"title","summary"}], "characters":[{"name","role","description"}], "world":[{"category","name","detail"}]}\n- outline: one or more ${unitName(project.type).toLowerCase()}-level entries summarizing what happens in THIS text, in order.\n- characters: everyone who appears; role = their function, tier = "main" | "supporting" | "ancillary" by importance, description = 1-2 sentences on who they are.\n- world: setting / era / rules / culture / history / mood elements present. "category" must be EXACTLY one of: ${WORLD_CATEGORIES.join(", ")}.\nUse [] for any key with nothing to add.\n\n"""${text.slice(0,9000)}"""`
      });
      const j = parseJSON(out);
      const patch={}; const bits=[];
      if(Array.isArray(j.outline)&&j.outline.length){ patch.chapters=mergeChapters(project.chapters,j.outline); bits.push(`${j.outline.length} outline entr${j.outline.length>1?"ies":"y"}`); }
      if(Array.isArray(j.characters)&&j.characters.length){ patch.characters=mergeChars(project.characters,j.characters,"writing"); bits.push(`${j.characters.length} character${j.characters.length>1?"s":""}`); }
      if(Array.isArray(j.world)&&j.world.length){ patch.world=mergeWorld(project.world,j.world,"writing"); bits.push(`${j.world.length} world element${j.world.length>1?"s":""}`); }
      if(Object.keys(patch).length) upd(patch);
      setStatus(bits.length? `Added ${bits.join(", ")} — check your Outline, Characters & World tabs.` : "Nothing new to pull from this text.");
    }catch(e){ setErr(e.message==="NO_KEY"?"Add your API key first.":e.message); setStatus(""); }
    setAnBusy(false);
  }

  async function onImportFile(e){
    const file=e.target.files[0]; if(!file) return;
    if(!ai.ready){ openSettings(); if(fileRef.current) fileRef.current.value=""; return; }
    setErr(""); setStatus(`Reading ${file.name}…`); setImpBusy(true);
    try{
      const r = await readUpload(file);
      if(r.pdf){ setErr("For written chapters, import a .docx, .txt, or .md so the text stays editable here. (PDFs can be read in the World tab.)"); setStatus(""); setImpBusy(false); if(fileRef.current) fileRef.current.value=""; return; }
      const title = file.name.replace(/\.[^.]+$/,"");
      const s={id:uid(), title, content:r.text, summary:""};
      upd({sections:[...project.sections, s]}); setActive(s.id);
      setImpBusy(false);
      await analyzeText(r.text, true);
    }catch(e){ setErr(e.message); setStatus(""); setImpBusy(false); }
    if(fileRef.current) fileRef.current.value="";
  }

  async function importPaste(){
    if(!pasteText.trim()) return;
    const s={id:uid(), title:`Imported ${project.sections.length+1}`, content:pasteText, summary:""};
    upd({sections:[...project.sections, s]}); setActive(s.id);
    const t=pasteText; setPasteText(""); setPasteOpen(false);
    await analyzeText(t, true);
  }

  return (
    <div className="split">
      <div>
        <div className="section-head">
          <div><h2>Writing</h2><div className="sub">{typeLabel(project.type)} · formatting is pre-set for this form. Freewrite freely.</div></div>
          <button className="btn btn-sm" onClick={()=>kind==="scenes"?addScene():addSection()}>+ New {(kind==="scenes"?"scene":primaryUnit(project.type).toLowerCase())}</button>
        </div>

        <RollingTip type={project.type} />

        <div className="today-bar">
          <span className="tb-label">Today</span>
          <div className="tb-track"><i style={{width:Math.min(100,Math.round(todayWritten/dailyGoal*100))+"%"}}></i></div>
          <span className="tb-count">{todayWritten.toLocaleString()} / <button className="tb-goal" title="Change your daily goal" onClick={()=>{const v=prompt("Words per day that feels doable (small beats ambitious):", String(dailyGoal)); const n=parseInt(v); if(n>0) upd({dailyGoal:n});}}>{dailyGoal.toLocaleString()}</button> words {todayWritten>=dailyGoal && <span className="tb-done">✓ done for today</span>}</span>
          {monthDays>0 && <span className="tb-identity">You've shown up {monthDays} day{monthDays===1?"":"s"} this month.</span>}
        </div>

        {celeb && (
          <div className="celebrate" onClick={()=>setCeleb(null)}>
            <span className="celeb-spark">✦</span> {celeb}
          </div>
        )}

        <div className="mode-row" style={{marginBottom:14}}>
          <button className={"mode-btn"+(kind==="chapters"?" on":"")} onClick={()=>setKind("chapters")}>{primaryUnit(project.type)}s</button>
          <button className={"mode-btn"+(kind==="scenes"?" on":"")} onClick={()=>setKind("scenes")}>{primaryUnit(project.type)!=="Scene"?"Scenes":"Loose scenes"} {scenes.length>0?`· ${scenes.length}`:""}</button>
        </div>

        {kind==="chapters" && (<div>
        <div className="upload-row" style={{marginBottom:16}}>
          <div className="ur-head">Already written some chapters?</div>
          <div className="ur-sub">Bring in a chapter (.docx, .txt, .md) and I'll add it here, then read it into your Outline, Characters &amp; World. Or paste the text.</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            <label className="file-btn">
              {impBusy? "Reading…" : "Import a chapter"}
              <input ref={fileRef} type="file" accept=".txt,.md,.markdown,.docx" style={{display:"none"}} onChange={onImportFile} disabled={impBusy||anBusy} />
            </label>
            <button className="btn btn-sm btn-ghost" onClick={()=>setPasteOpen(v=>!v)}>{pasteOpen?"Hide paste box":"…or paste text"}</button>
            {anBusy && <span className="key-status"><span className="spin dark"></span> Parsing into Outline · Characters · World…</span>}
          </div>
          {pasteOpen && (
            <div style={{marginTop:12}}>
              <textarea className="write-area small" value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder="Paste a chapter you've already written." />
              <div className="toolbar">
                <button className="btn btn-primary btn-sm" disabled={impBusy||anBusy||!pasteText.trim()} onClick={importPaste}>{iSpark} Import &amp; parse</button>
              </div>
            </div>
          )}
          {status && <div className="mono" style={{marginTop:10,color:"var(--sage)"}}>{status}</div>}
          {err && <div className="err">{err}</div>}
        </div>

        {FORMAT_GUIDES[project.type] && (
          <div className="howbox" style={{marginBottom:16}}>
            <button className="how-toggle" onClick={()=>setFmtOpen(v=>!v)}>
              <span>Industry format guide {fmtOpen?"▲":"▼"}</span>
              <span className="mono">standard {typeLabel(project.type).toLowerCase()} formatting</span>
            </button>
            {fmtOpen && (
              <div className="how-body">
                <div className="how-steps" style={{gridTemplateColumns:"1fr"}}>
                  {FORMAT_GUIDES[project.type].map((t,i)=>(
                    <div className="how-step" key={i}><span className="hs-n">{i+1}</span><div className="hs-p" style={{fontSize:13.5,color:"var(--ink)"}}>{t}</div></div>
                  ))}
                </div>
                <button className="btn btn-sm" disabled={!current} onClick={()=>current && editSection(current.id,{content: current.content && current.content.trim()? current.content+"\n\n"+scaffold(project.type) : scaffold(project.type)})}>
                  + Insert format template into this {unitName(project.type).toLowerCase()}
                </button>
                <div style={{fontSize:11,color:"var(--muted)",fontStyle:"italic",marginTop:6}}>The template approximates standard layout in plain text — final margins and indents are applied when you format for submission.</div>
              </div>
            )}
          </div>
        )}

        {sections.length===0
          ? <div className="empty">
              <div className="big">Blank page, or bring your outline over</div>
              Start a {unitName(project.type).toLowerCase()} with <button className="btn btn-sm" style={{margin:"0 4px"}} onClick={addSection}>+ New {unitName(project.type).toLowerCase()}</button>
              — or build an outline first and send it here.
            </div>
          : <div>
              <div style={{display:"flex",gap:8,alignItems:"flex-start",flexWrap:"wrap",marginBottom:6}}>
                <div style={{flex:1,minWidth:220}}><DocPicker items={sections} activeId={current?.id} onPick={setActive} /></div>
                {sections.length>=1 && <button className={"btn btn-sm"+(readAll?" btn-primary":"")} onClick={()=>{ const nv=!readAll; setReadAll(nv); if(nv) setEdScope("whole"); }}>{readAll?"✎ Back to writing":"📖 Read + links"}</button>}
              </div>
              {readAll ? (
                <div>
                  {sections.map(x=>(
                    <div key={x.id} style={{marginBottom:28}}>
                      <div style={{fontFamily:"'Fraunces'",fontSize:20,fontWeight:500,margin:"0 0 8px"}}>{x.title}</div>
                      {x.content&&x.content.trim()
                        ? <LinkedProse text={x.content} characters={project.characters} onJumpToChar={onJumpToChar} />
                        : <div className="empty" style={{padding:14}}>Not drafted yet.</div>}
                    </div>
                  ))}
                  <div className="wc">{sections.reduce((n,x)=>n+((x.content||"").trim()? x.content.trim().split(/\s+/).length:0),0).toLocaleString()} words total · character names link to their cards</div>
                </div>
              ) : current && <>
                <div className="add-inline" style={{marginBottom:10}}>
                  <input value={current.title} onChange={e=>editSection(current.id,{title:e.target.value})} style={{fontFamily:"Fraunces",fontSize:18,border:"none",background:"none"}} />
                  <button className="btn btn-ghost btn-sm" onClick={()=>delSection(current.id)}>Delete</button>
                </div>
                <textarea className="write-area" style={["play","screenplay"].includes(project.type)?{fontFamily:"'IBM Plex Mono',monospace",fontSize:14.5}:undefined} value={current.content}
                  onChange={e=>editSection(current.id,{content:e.target.value})}
                  placeholder={scaffold(project.type)? "Formatting scaffold is filled in — write over it." : "Begin…"} />
                <div className="wc">{wordCount} words</div>
                {(()=>{ const oc=(project.chapters||[]).find(c=>c.title===current.title);
                  const rel=scenes.filter(s=>oc && s.chapterId===oc.id);
                  return rel.length? (
                    <div className="card" style={{margin:"10px 0 0",background:"var(--sage-soft)",borderColor:"#D7E0E4"}}>
                      <div className="mono" style={{marginBottom:4}}>Scenes waiting to fold into this {unitName(project.type).toLowerCase()}</div>
                      {rel.map(s=>(
                        <div className="slot-item" key={s.id}>
                          <span className="reading" style={{flex:1,fontSize:14}}>{s.title} <span className="mono" style={{fontSize:9}}>{s.content&&s.content.trim()? s.content.trim().split(/\s+/).length+" words":"idea only"}</span></span>
                          <button className="slot-mini" style={{fontSize:11,color:"var(--indigo)"}} onClick={()=>{setKind("scenes");setActiveScene(s.id);}}>open →</button>
                        </div>
                      ))}
                      <div style={{fontSize:11,color:"var(--muted)",fontStyle:"italic",marginTop:4}}>Open a scene to reread it, then weave it in here in your own words.</div>
                    </div>
                  ):null; })()}
                <div className="toolbar">
                  <button className="btn btn-primary btn-sm" disabled={inspBusy} onClick={inspireMe}>
                    {inspBusy? <><span className="spin"></span> Finding a spark…</> : <>{iSpark} Inspire me</>}
                  </button>
                  <button className="btn btn-sm" disabled={keeperBusy} onClick={findKeeper}>
                    {keeperBusy? <><span className="spin dark"></span> Hunting…</> : <>{iSpark} Find a line worth keeping</>}
                  </button>
                  <button className="btn btn-sm" disabled={busy} onClick={summarize}>
                    {busy? <><span className="spin dark"></span> Summarizing…</> : <>{iSpark} Summarize this {unitName(project.type).toLowerCase()}</>}
                  </button>
                  <button className="btn btn-sm" disabled={anBusy} onClick={()=>analyzeText(current.content, false)}>
                    {anBusy? <><span className="spin dark"></span> Parsing…</> : <>{iSpark} Update outline · characters · world</>}
                  </button>
                </div>
                {keeperOut && (
                  <div className="card" style={{marginTop:12,background:"var(--amber-soft)",borderColor:"#E9D4B4"}}>
                    <div className="mono" style={{marginBottom:6,color:"var(--amber)"}}>Lines worth keeping — yours, verbatim</div>
                    {keeperOut.map((l,i)=>(
                      <div key={i} style={{marginBottom:8}}>
                        <div className="reading" style={{fontSize:15.5,fontStyle:"italic",color:"#5A4426"}}>“{l.quote}”</div>
                        <div style={{fontSize:12.5,color:"var(--muted)",marginTop:2}}>{l.why}</div>
                      </div>
                    ))}
                  </div>
                )}
                {inspire && (
                  <div className="card" style={{marginTop:12,background:"var(--indigo-soft)",borderColor:"#c9e3e0"}}>
                    <div className="mono" style={{marginBottom:4,color:"var(--indigo)"}}>A spark — not a draft</div>
                    <div className="reading" style={{fontSize:15,color:"#173a37"}}>{inspire}</div>
                    <div style={{fontSize:11.5,color:"var(--muted)",marginTop:8,fontStyle:"italic"}}>The next words are yours to write.</div>
                  </div>
                )}
                {current.summary && (
                  <div className="card" style={{marginTop:12,background:"var(--sage-soft)",borderColor:"#D7E0E4"}}>
                    <div className="mono" style={{marginBottom:4}}>End-of-{unitName(project.type).toLowerCase()} summary</div>
                    <div className="reading" style={{fontSize:15,color:"#2C4A5A"}}>{current.summary}</div>
                  </div>
                )}
                {err && <div className="err">{err}</div>}
              </>}
            </div>}
        </div>)}

        {kind==="scenes" && (
          <div>
            <div className="upload-row" style={{marginBottom:16,background:"var(--sage-soft)"}}>
              <div className="ur-head">Scenes — write the moment that's calling you</div>
              <div className="ur-sub">Dive into any scene just because it excites you. Tag it to a beat and (optionally) a {unitName(project.type).toLowerCase()} — when you eventually draft that {unitName(project.type).toLowerCase()}, the scene will be waiting right there to fold in. No order required.</div>
              <button className="btn btn-primary btn-sm" onClick={addScene}>+ New scene</button>
            </div>

            {scenes.length===0
              ? <div className="empty"><div className="big">No scenes yet</div>A scene is a moment — a conversation, a confrontation, a first meeting. Write the one you can already see.</div>
              : <div>
                  <DocPicker items={scenes} activeId={curScene?.id} onPick={setActiveScene} />
                  {curScene && <>
                    <div className="add-inline" style={{marginBottom:8}}>
                      <input value={curScene.title} onChange={e=>editScene(curScene.id,{title:e.target.value})} style={{fontFamily:"Fraunces",fontSize:18,border:"none",background:"none"}} />
                      <button className="btn btn-ghost btn-sm" onClick={()=>delScene(curScene.id)}>Delete</button>
                    </div>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10,alignItems:"center"}}>
                      <select className="world-select" value={curScene.beat||""} onChange={e=>editScene(curScene.id,{beat:e.target.value})}>
                        <option value="">— which beat does this serve? —</option>
                        {beatsOf(project).map(b=><option key={b.k} value={b.k}>{b.step}</option>)}
                      </select>
                      <button className="btn btn-sm" disabled={beatBusy} onClick={suggestBeat}>
                        {beatBusy? <><span className="spin dark"></span> Placing…</> : <>{iSpark} Suggest beat</>}
                      </button>
                      <select className="world-select" value={curScene.chapterId||""} onChange={e=>editScene(curScene.id,{chapterId:e.target.value})}>
                        <option value="">— belongs to a {unitName(project.type).toLowerCase()}? (optional) —</option>
                        {(project.chapters||[]).map(c=><option key={c.id} value={c.id}>{c.title}</option>)}
                      </select>
                    </div>
                    {beatSuggest && (()=>{ const b=beatsOf(project).find(x=>x.k===beatSuggest.beatKey); return (
                      <div className="beat-suggest">
                        <div><span className="mono">Suggested beat</span> — <b>{b?b.step:beatSuggest.beatKey}</b></div>
                        <div className="reading" style={{fontSize:13.5,margin:"4px 0 8px",fontStyle:"italic"}}>{beatSuggest.why}</div>
                        <div style={{display:"flex",gap:8}}>
                          <button className="btn btn-primary btn-sm" onClick={()=>{ editScene(curScene.id,{beat:beatSuggest.beatKey}); setBeatSuggest(null); }}>Apply</button>
                          <button className="btn btn-ghost btn-sm" onClick={()=>setBeatSuggest(null)}>Dismiss</button>
                        </div>
                      </div>
                    ); })()}
                    <textarea className="write-area" style={["play","screenplay"].includes(project.type)?{fontFamily:"'IBM Plex Mono',monospace",fontSize:14.5}:undefined} value={curScene.content}
                      onChange={e=>editScene(curScene.id,{content:e.target.value})}
                      placeholder="Just this moment. Nothing before or after it matters right now." />
                    <div className="wc">{curScene.content.trim()? curScene.content.trim().split(/\s+/).length:0} words</div>
                    <div className="toolbar">
                      <button className="btn btn-primary btn-sm" disabled={inspBusy} onClick={inspireMe}>
                        {inspBusy? <><span className="spin"></span> Finding a spark…</> : <>{iSpark} Inspire me</>}
                      </button>
                    </div>
                    {inspire && (
                      <div className="card" style={{marginTop:12,background:"var(--indigo-soft)",borderColor:"#c9e3e0"}}>
                        <div className="mono" style={{marginBottom:4,color:"var(--indigo)"}}>A spark — not a draft</div>
                        <div className="reading" style={{fontSize:15,color:"#173a37"}}>{inspire}</div>
                        <div style={{fontSize:11.5,color:"var(--muted)",marginTop:8,fontStyle:"italic"}}>The next words are yours to write.</div>
                      </div>
                    )}
                    {err && <div className="err">{err}</div>}
                  </>}
                </div>}
          </div>
        )}
      </div>

      {/* AI EDITOR */}
      <div className="editor-panel">
        <h3>AI editor</h3>
        <div className="ed-sub">Tuned to {typeLabel(project.type).toLowerCase()}. Choose what it should watch for. Buttons marked {iSpark} use your API key (a few cents each).</div>
        <div className="chips">
          {FOCUS_OPTIONS.map(f=>(
            <button key={f.id} className={"chip"+(project.editorFocus.includes(f.id)?" on":"")} onClick={()=>toggleFocus(f.id)}>{f.t}</button>
          ))}
        </div>
        <div className="scope-master">
          <div className="scope-row">
            <span className="mono" style={{color:"var(--indigo)"}}>Scope</span>
            <select className="world-select" style={{textOverflow:"ellipsis"}} value={edScope} onChange={e=>setEdScope(e.target.value)}>
              <option value="current">This {unitName(project.type).toLowerCase()} only — "{current?current.title:"—"}"</option>
              <option value="whole">Whole draft · {sections.length} {unitName(project.type).toLowerCase()}{sections.length===1?"":"s"} stitched</option>
            </select>
          </div>
          <div className="scope-note">Applies to <b>everything below</b> — editorial notes, Ask the editor, and the reader's seat all read the scope you set here.</div>
        </div>
        <button className="btn btn-red" style={{width:"100%"}} disabled={edBusy} onClick={getFeedback}>
          {edBusy? <><span className="spin"></span> Reading {edScope==="whole"?"your whole draft":"this "+unitName(project.type).toLowerCase()}…</> : <>{iSpark} Get editorial notes</>}
        </button>
        {project.editorOut && (typeof project.editorOut==="string"
          ? <div className="ed-out">{project.editorOut}</div>
          : <div className="ed-out" style={{whiteSpace:"normal"}}>
              {project.editorOut.strengths && <div style={{marginBottom:10}}><div className="mono" style={{marginBottom:4,color:"var(--sage)"}}>What's working</div>{project.editorOut.strengths}</div>}
              {Array.isArray(project.editorOut.notes) && project.editorOut.notes.map((n,i)=>(
                <div className={"flag "+(n.severity||"low")} key={i}>
                  <div className="ft"><span>{n.focus?n.focus+": ":""}{n.note}</span><span className="fsev">{n.severity||""}</span></div>
                  <div className="fd">{n.detail}</div>
                </div>
              ))}
              {project.editorOut.oneThing && <div style={{marginTop:10,padding:"10px 12px",background:"var(--amber-soft)",borderRadius:8,fontSize:13.5}}><b>The one thing:</b> {project.editorOut.oneThing}</div>}
              {Array.isArray(project.editorOut.notes) && project.editorOut.notes.length>0 && <div style={{fontSize:11.5,color:"var(--sage)",fontStyle:"italic",marginTop:8}}>✓ Notes filed to the Review tab — resolve, backlog, or dismiss them there.</div>}
            </div>)}

        <div style={{borderTop:"1px solid #d8e0e6",margin:"16px 0 12px",paddingTop:14}}>
          <h3 style={{fontSize:15}}>Ask the editor</h3>
          <div className="ed-sub">Question what you're looking at — it answers about your pages, never rewrites them. Uses the scope above.</div>
          <textarea className="write-area small" style={{minHeight:56,fontSize:14}} value={askQ} onChange={e=>setAskQ(e.target.value)}
            placeholder={'e.g. "Does the middle drag?" or "Is the protagonist\'s motivation clear here?"'} />
          <button className="btn" style={{width:"100%",marginTop:8}} disabled={askBusy||!askQ.trim()} onClick={askEditor}>
            {askBusy? <><span className="spin dark"></span> Reading…</> : <>{iSpark} Ask</>}
          </button>
          {askOut && <div className="ed-out">{askOut}</div>}
        </div>

        <div style={{borderTop:"1px solid #d8e0e6",margin:"16px 0 12px",paddingTop:14}}>
          <h3 style={{fontSize:15}}>The reader's seat</h3>
          <div className="ed-sub">A {project.genre||typeLabel(project.type)} reader describes their experience of your pages — where they lean in, what they're curious about, and doors worth opening. Never "fit the market"; always "here's what's alive."</div>
          <button className="btn" style={{width:"100%"}} disabled={seatBusy} onClick={readersSeat}>
            {seatBusy? <><span className="spin dark"></span> Reading as your reader…</> : <>{iSpark} Take the reader's seat</>}
          </button>
          {seatOut && (
            <div className="ed-out" style={{whiteSpace:"normal"}}>
              {seatOut.connection && <div style={{marginBottom:10,fontStyle:"italic"}}>{seatOut.connection}</div>}
              {Array.isArray(seatOut.pulling)&&seatOut.pulling.length>0 && <>
                <div className="mono" style={{margin:"8px 0 4px",color:"var(--sage)"}}>Where readers lean in</div>
                {seatOut.pulling.map((x,i)=><div key={i} style={{marginBottom:6}}><b style={{fontWeight:600}}>{x.moment}</b><div style={{fontSize:12.5,color:"var(--muted)"}}>{x.why}</div></div>)}
              </>}
              {Array.isArray(seatOut.questions)&&seatOut.questions.length>0 && <>
                <div className="mono" style={{margin:"10px 0 4px",color:"var(--indigo)"}}>Questions readers are carrying <span style={{textTransform:"none"}}>(engagement, not problems)</span></div>
                {seatOut.questions.map((q,i)=><div key={i} style={{fontSize:13,marginBottom:3}}>· {q}</div>)}
              </>}
              {Array.isArray(seatOut.doors)&&seatOut.doors.length>0 && <>
                <div className="mono" style={{margin:"10px 0 4px",color:"var(--amber)"}}>Doors worth opening</div>
                {seatOut.doors.map((d,i)=><div key={i} style={{marginBottom:6}}><b style={{fontWeight:600}}>{d.spark}</b><div style={{fontSize:12.5,color:"var(--muted)"}}>{d.why}</div>
                  {logReview && (sentDoors.includes(i)
                    ? <span className="mono" style={{fontSize:9,color:"var(--sage)"}}>✓ tracked in Review</span>
                    : <button className="btn btn-ghost btn-sm" style={{padding:"1px 8px",fontSize:11,marginTop:2}} onClick={()=>{ logReview([{kind:"audience", severity:"low", text:(d.spark||"Reader door").slice(0,90), detail:d.why, where: edScope==="whole"?"whole draft":(activeDoc?activeDoc.title:"")}]); setSentDoors(s=>[...s,i]); }}>+ Track in Review</button>)}
                </div>)}
              </>}
              <div style={{fontSize:11.5,color:"var(--muted)",fontStyle:"italic",marginTop:8}}>These are invitations, not instructions — your story leads, the audience follows.</div>
            </div>
          )}
        </div>

        <div style={{borderTop:"1px solid #d8e0e6",margin:"16px 0 12px",paddingTop:14}}>
          <h3 style={{fontSize:15}}>Continuity check</h3>
          <div className="ed-sub">Flags contradictions against your characters, world, and other chapters. It flags — you decide.</div>
          <button className="btn" style={{width:"100%"}} disabled={flagBusy} onClick={consistencyCheck}>
            {flagBusy? <><span className="spin dark"></span> Cross-checking…</> : <>{iSpark} Check for contradictions</>}
          </button>
          {flags!==null && (flags.length===0
            ? <div className="reading" style={{fontSize:14,color:"var(--sage)",marginTop:10}}>No contradictions found against what's on record. ✓</div>
            : <div style={{marginTop:10}}>
                {flags.map((f,i)=>(
                  <div className={"flag "+(f.severity||"low")} key={i}>
                    <div className="ft"><span>{f.flag||"Possible conflict"}</span><span className="fsev">{f.severity||""}</span></div>
                    <div className="fd">{f.detail}</div>
                  </div>
                ))}
                <div style={{fontSize:11.5,color:"var(--sage)",fontStyle:"italic",marginTop:6}}>✓ Filed to the Review tab, where you can resolve, backlog, or dismiss each one.</div>
              </div>)}
        </div>

        <div style={{fontFamily:"'Newsreader'",fontStyle:"italic",fontSize:12,color:"var(--muted)",marginTop:8,lineHeight:1.5}}>
          The editor suggests and questions — it never rewrites or changes your story. Every revision is your call.
        </div>
      </div>
    </div>
  );
}

/* ---------------- EXPORT MODAL ---------------- */
function ExportModal({project, close}){
  const [subject,setSubject]=useState("everything");
  const counts={outline:project.chapters.length,characters:project.characters.length,world:project.world.length,writing:project.sections.length};
  const subjects=[["everything","Everything"],["outline","Outline"],["characters","Characters"],["world","World"],["writing","Writing"]];
  const go=(fmt)=>{ runExport(project,subject,fmt); if(fmt!=="pdf") close(); };
  const selStyle={background:"var(--indigo)",borderColor:"var(--indigo)",color:"#fff"};
  return (
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")close();}}>
      <div className="modal">
        <h2>Export</h2>
        <p className="m">Pick what to export, then a format. Everything is generated on your device.</p>
        <label>What to export</label>
        <div className="chips" style={{marginBottom:18}}>
          {subjects.map(([id,lbl])=>(
            <button key={id} className="chip" style={subject===id?selStyle:{}} onClick={()=>setSubject(id)}>
              {lbl}{id!=="everything" && counts[id]>0? ` · ${counts[id]}`:""}
            </button>
          ))}
        </div>
        <label>Format</label>
        <div style={{display:"flex",gap:8,marginTop:6}}>
          <button className="btn btn-primary" style={{flex:1,justifyContent:"center"}} onClick={()=>go("docx")}>Word .docx</button>
          <button className="btn" style={{flex:1,justifyContent:"center"}} onClick={()=>go("pdf")}>PDF</button>
          <button className="btn" style={{flex:1,justifyContent:"center"}} onClick={()=>go("md")}>Markdown</button>
        </div>
        <div className="privacy" style={{marginTop:16}}>
          Word and Markdown download straight to your device. PDF opens your browser's print dialog — choose <b>Save as PDF</b> as the destination.
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:16}}>
          <button className="btn btn-ghost" onClick={close}>Done</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------- SETTINGS ---------------- */
function SettingsModal({settings, setSettings, close, onBackup, onRestore}){
  const [key, setKey] = useState(settings.apiKey);
  const [model, setModel] = useState(settings.model);
  const [font, setFont] = useState(settings.font||"sans");
  const restoreRef = React.useRef(null);
  const [msg, setMsg] = useState("");
  return (
    <div className="overlay" onClick={e=>{if(e.target.className==="overlay")close();}}>
      <div className="modal">
        <h2>Settings</h2>
        <p className="m">Your Writing Room uses your own Anthropic API key for every AI feature.</p>
        <label>Anthropic API key</label>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-..." />
        <details className="keyhelp">
          <summary>New to this? How to get your own key →</summary>
          <div className="keyhelp-body">
            <p>Every AI feature here runs on <b>your own</b> Anthropic key, so you pay Anthropic directly for what you use — usually just a few cents per request — and your writing never passes through anyone else's server. It takes about five minutes to set up:</p>
            <ol>
              <li>Go to <b>console.anthropic.com</b> and sign in (or create a free account with your email or Google).</li>
              <li>Open <b>Settings → Billing</b> and add a payment method. <i>Don't skip this</i> — a key won't work until billing is set up, and it's the most common reason a new key fails.</li>
              <li>Open <b>Settings → API keys</b>, click <b>Create Key</b>, and give it a name like "Writing Room."</li>
              <li><b>Copy the key right away</b> — Anthropic shows it only once. It starts with <span className="mono" style={{textTransform:"none"}}>sk-ant-</span>.</li>
              <li>Paste it into the box above. That's it — you're set.</li>
            </ol>
            <p className="keyhelp-note">Good to know: an Anthropic API account is <b>separate</b> from a Claude Pro/Max subscription — a subscription doesn't include API access, and vice versa. You can also set a monthly spending cap in the console if you'd like a hard limit on cost. New accounts sometimes get a small free credit to start.</p>
          </div>
        </details>
        <label>Model</label>
        <select value={model} onChange={e=>setModel(e.target.value)}>
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6 — balanced (recommended)</option>
          <option value="claude-opus-4-8">Claude Opus 4.8 — highest quality</option>
          <option value="claude-haiku-4-5-20251001">Claude Haiku 4.5 — fastest / cheapest</option>
        </select>
        <label>Typeface</label>
        <div className="chips" style={{marginBottom:14}}>
          {Object.entries(FONTS).map(([id,f])=>(
            <button key={id} className="chip" style={font===id?{background:"var(--indigo)",borderColor:"var(--indigo)",color:"#fff"}:{}} onClick={()=>setFont(id)}>
              {f.label} · <span style={{opacity:.7}}>{f.note}</span>
            </button>
          ))}
        </div>
        <div className="privacy">
          Your key is stored only in this browser and sent directly to Anthropic — never to any other server. Get a key at console.anthropic.com. Usage is billed to your own account.
        </div>

        {onBackup && (
          <div style={{borderTop:"1px solid var(--line)",marginTop:14,paddingTop:14}}>
            <label style={{marginTop:0}}>Your writing — backup &amp; restore</label>
            <div style={{fontSize:12.5,color:"var(--muted)",lineHeight:1.5,marginBottom:10}}>
              Everything you write lives in <b>this browser only</b>. Clearing browser data, switching devices, or switching browsers won't carry it over on its own — so download a backup regularly; it's the only copy. <b>Working across devices?</b> Finish your session on one device, back up, then import that file on the other — the newer version of each project wins, and anything unique to a device is kept. Just avoid editing the same project in two places at once.
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              <button className="btn btn-sm" onClick={onBackup}>↓ Back up all projects</button>
              <button className="btn btn-sm" onClick={()=>restoreRef.current&&restoreRef.current.click()}>↑ Restore from backup</button>
              <input ref={restoreRef} type="file" accept="application/json,.json" style={{display:"none"}} onChange={e=>{
                const f=e.target.files[0]; if(!f) return;
                const merge = window.confirm("Restore from backup.\n\nOK = SMART MERGE (recommended): for any project you already have, the newer version wins and the older is kept as a labeled backup copy. Projects only on this device are untouched; projects only in the file are added.\n\nCancel = REPLACE: wipe everything here and load only the backup. Any project that exists only on this device will be lost.");
                onRestore(f, merge?"merge":"replace", (err,n)=>{ setMsg(err?"⚠ "+err:`✓ Restored ${n} project${n===1?"":"s"}.`); setTimeout(()=>setMsg(""),5000); });
                e.target.value="";
              }} />
            </div>
            {msg && <div className="mono" style={{marginTop:8,color:msg[0]==="⚠"?"#B4472F":"var(--indigo)"}}>{msg}</div>}
          </div>
        )}

        <div style={{fontSize:11.5,color:"var(--muted)",marginTop:12,lineHeight:1.5,borderTop:"1px solid var(--line)",paddingTop:12}}>
          <b>Method &amp; credit.</b> Structure and craft prompts are inspired by <i>Invisible Ink</i> by Brian McDonald and the Story Spine (Kenn Adams / Pixar), expressed here in our own words. This tool is not affiliated with or endorsed by them. It helps you organize, sharpen, and finish your story — it never writes or changes it.
        </div>
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:18}}>
          <button className="btn btn-ghost" onClick={close}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>{ setSettings({apiKey:key.trim(), model, font}); close(); }}>Save</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
